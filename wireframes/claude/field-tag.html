<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FIELD TAG — Log Catch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Spline+Sans+Mono:wght@400;500;600&family=Saira+Semi+Condensed:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#efe7d3;       /* kraft / cream tag */
    --paper-deep:#e6dcc2;  /* shaded paper */
    --desk:#241d14;        /* dark desk surround */
    --desk-2:#1b150e;
    --ink:#18283f;         /* deep ink navy */
    --ink-soft:#3c4d63;
    --verm:#cf3b2a;        /* stamped vermillion */
    --green:#2f6b46;       /* KEPT */
    --slate:#2d6f9e;       /* RELEASED */
    --rule:#b9ad8e;        /* hairline rule on paper */
    --rule-soft:#cabf9f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:#0e0b07;
    font-family:"Spline Sans Mono",ui-monospace,monospace;
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    min-height:100%;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- iPhone frame ---------- */
  .device{
    position:relative;width:390px;height:844px;border-radius:54px;
    background:#05060a;
    box-shadow:0 0 0 11px #0a0c10, 0 0 0 13px #20242c, 0 38px 90px rgba(0,0,0,.62);
  }
  .screen{
    position:absolute;inset:0;width:390px;height:844px;border-radius:54px;overflow:hidden;
    background:
      radial-gradient(120% 80% at 18% 0%, #2c2417 0%, var(--desk) 46%, var(--desk-2) 100%);
  }
  /* desk grain */
  .screen::before{
    content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='160' height='160' filter='url(%23n)' opacity='0.55'/></svg>");
  }
  /* status bar */
  .status{
    position:absolute;top:0;left:0;right:0;height:50px;z-index:40;
    display:flex;align-items:flex-end;justify-content:space-between;
    padding:0 30px 7px;color:#e9dfc8;
    font-family:"Saira Semi Condensed",sans-serif;font-weight:600;font-size:14px;letter-spacing:.3px;
    pointer-events:none;
  }
  .status .dots{display:flex;align-items:center;gap:5px}
  .status svg{display:block}
  .notch{
    position:absolute;top:11px;left:50%;transform:translateX(-50%);
    width:118px;height:31px;background:#05060a;border-radius:18px;z-index:45;
  }

  /* ---------- desk furniture / header ---------- */
  .deskhead{
    position:absolute;top:54px;left:0;right:0;z-index:30;
    display:flex;align-items:center;justify-content:space-between;
    padding:6px 24px 0;color:#c9bd9d;
    pointer-events:none;
  }
  .deskhead .back{
    font-family:"Saira Semi Condensed",sans-serif;font-weight:600;font-size:15px;
    letter-spacing:.5px;display:flex;align-items:center;gap:6px;color:#cdc1a1;
  }
  .deskhead .eyebrow{
    font-family:"Spline Sans Mono",monospace;font-weight:500;font-size:10.5px;
    letter-spacing:3.4px;text-transform:uppercase;color:#9c906f;
  }

  /* faint coffee ring on the desk */
  .ring{
    position:absolute;z-index:20;width:128px;height:128px;right:-30px;top:120px;
    border-radius:50%;border:9px solid rgba(120,86,40,.16);
    box-shadow:inset 0 0 0 3px rgba(120,86,40,.07);
    transform:rotate(8deg);pointer-events:none;filter:blur(.3px);
  }

  /* ---------- THE TAG ---------- */
  .tag-wrap{
    position:absolute;z-index:25;left:50%;top:96px;transform:translateX(-50%);
    width:330px;
    animation:drop .9s cubic-bezier(.18,.9,.24,1) both;
  }
  @keyframes drop{
    0%{transform:translateX(-50%) translateY(-26px) rotate(-3.4deg);opacity:0}
    62%{transform:translateX(-50%) translateY(3px) rotate(.8deg);opacity:1}
    100%{transform:translateX(-50%) translateY(0) rotate(-1.1deg)}
  }
  /* twine + punched hole */
  .twine{position:absolute;left:50%;top:-30px;transform:translateX(-50%);z-index:3;width:80px;height:46px}
  .tag{
    position:relative;background:var(--paper);
    border-radius:8px;
    padding:16px 18px 14px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.5) inset,
      0 22px 34px rgba(0,0,0,.46),
      0 6px 12px rgba(0,0,0,.34);
    transform:rotate(-1.1deg);
  }
  .tag.released{background:#e9e6dd}
  /* paper grain + fibers */
  .tag::before{
    content:"";position:absolute;inset:0;border-radius:8px;pointer-events:none;opacity:.5;mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='p'><feTurbulence type='fractalNoise' baseFrequency='0.045 0.11' numOctaves='3' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='180' height='180' filter='url(%23p)' opacity='0.6'/></svg>");
  }
  /* deckled torn left edge + top notch via mask-ish clip using radial dots */
  .tag::after{
    content:"";position:absolute;left:0;top:0;bottom:0;width:7px;border-radius:8px 0 0 8px;pointer-events:none;
    background:
      radial-gradient(circle at 0 6px, transparent 3px, rgba(0,0,0,.05) 3.4px) 0 0/7px 13px repeat-y;
    opacity:.5;
  }
  .tag-hole{
    position:absolute;top:-2px;left:50%;transform:translateX(-50%);
    width:18px;height:18px;border-radius:50%;
    background:radial-gradient(circle at 50% 40%, #b7ab8b, #cabf9f);
    box-shadow:inset 0 2px 3px rgba(0,0,0,.45), 0 1px 0 rgba(255,255,255,.5);
    z-index:4;
  }

  /* tag header row */
  .tag-top{display:flex;align-items:flex-start;justify-content:space-between;margin:6px 0 2px}
  .tag-top .lockup{display:flex;flex-direction:column;line-height:1}
  .tag-title{
    font-family:"Fraunces",serif;font-weight:900;font-size:19px;letter-spacing:.4px;color:var(--ink);
    font-variation-settings:"opsz" 80;
  }
  .tag-sub{
    font-family:"Spline Sans Mono",monospace;font-size:8.5px;letter-spacing:3px;
    text-transform:uppercase;color:var(--ink-soft);margin-top:3px;
  }
  .serial{
    font-family:"Spline Sans Mono",monospace;font-size:9px;letter-spacing:1.5px;color:var(--ink-soft);
    text-align:right;line-height:1.5;
  }
  .reg{display:inline-block;width:11px;height:11px;position:relative;margin-left:auto;margin-top:1px}
  .reg::before,.reg::after{content:"";position:absolute;background:var(--ink-soft)}
  .reg::before{left:5px;top:0;width:1px;height:11px}
  .reg::after{top:5px;left:0;height:1px;width:11px}

  .hr{height:0;border-top:1.4px solid var(--ink);opacity:.85;margin:8px 0}
  .hr.thin{border-top:1px dashed var(--rule);opacity:.9}

  /* ---------- body: ruler + readout ---------- */
  .core{display:flex;gap:14px;margin-top:2px}

  /* measuring board ruler */
  .board{
    position:relative;width:62px;height:300px;flex:0 0 62px;
    border:1.4px solid var(--ink);border-radius:5px;
    background:
      linear-gradient(180deg, #f4eeda, #e9e0c6);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.6), inset 0 0 0 3px rgba(239,231,211,.55);
    overflow:hidden;
  }
  .board .bumphead{
    position:absolute;top:0;left:0;right:0;height:16px;background:var(--ink);
    color:var(--paper);font-family:"Saira Semi Condensed",sans-serif;font-weight:600;
    font-size:8.5px;letter-spacing:2px;text-align:center;line-height:16px;z-index:3;
  }
  .board svg{position:absolute;inset:0;width:100%;height:100%}
  .fishmark{
    position:absolute;left:0;right:0;z-index:5;height:34px;
    top:64px; /* JS-positioned for 18.5" */
    display:flex;align-items:center;
    transition:top .28s cubic-bezier(.2,.8,.2,1);
  }
  .fishmark .bar{
    position:absolute;left:0;right:0;top:50%;height:0;border-top:2px solid var(--verm);
    box-shadow:0 0 0 .5px rgba(207,59,42,.35);
  }
  .fishmark .knob{
    position:absolute;right:3px;top:50%;transform:translateY(-50%);
    width:26px;height:26px;border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #e8593f, var(--verm));
    border:1.6px solid #fff;
    box-shadow:0 3px 7px rgba(120,20,10,.5);
    display:flex;align-items:center;justify-content:center;
  }
  .fishmark .knob svg{position:static;width:15px;height:15px}

  /* readout + fields column */
  .right{flex:1;display:flex;flex-direction:column;min-width:0}
  .readout{
    display:flex;align-items:baseline;gap:3px;margin-top:-2px;
  }
  .readout .num{
    font-family:"Fraunces",serif;font-weight:600;font-size:74px;line-height:.78;color:var(--ink);
    font-variation-settings:"opsz" 140;letter-spacing:-2px;
    animation:snap .5s .35s cubic-bezier(.2,1.5,.3,1) both;
  }
  @keyframes snap{0%{transform:scale(.86);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
  .readout .frac{
    font-family:"Fraunces",serif;font-weight:600;font-size:30px;color:var(--ink);
    font-variation-settings:"opsz" 90;margin-left:-2px;
  }
  .readout .in{
    font-family:"Spline Sans Mono",monospace;font-weight:600;font-size:14px;color:var(--verm);
    letter-spacing:1px;margin-left:2px;
  }
  .lenlabel{
    font-family:"Spline Sans Mono",monospace;font-size:8.5px;letter-spacing:3px;text-transform:uppercase;
    color:var(--ink-soft);margin:2px 0 0 2px;
  }
  .stepper{display:flex;gap:7px;margin-top:9px}
  .stepper button{
    flex:1;height:30px;border:1.3px solid var(--ink);border-radius:5px;background:transparent;
    color:var(--ink);font-family:"Fraunces",serif;font-weight:700;font-size:18px;line-height:1;
    cursor:pointer;
  }
  .stepper button:active{background:var(--ink);color:var(--paper)}

  /* species rubber stamps */
  .species{margin-top:13px}
  .species .lab{
    font-family:"Spline Sans Mono",monospace;font-size:8px;letter-spacing:2.6px;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:5px;
  }
  .stamps{display:flex;gap:5px}
  .stamp{
    width:34px;height:30px;border:1.2px solid var(--rule);border-radius:4px;
    display:flex;align-items:center;justify-content:center;background:transparent;cursor:pointer;
    color:#9c906f;
  }
  .stamp svg{width:24px;height:18px}
  .stamp.on{
    border:1.4px solid var(--verm);color:var(--verm);
    background:rgba(207,59,42,.07);
    box-shadow:0 0 0 1px rgba(207,59,42,.18) inset;
    animation:ink .4s .5s cubic-bezier(.2,1.6,.3,1) both;
  }
  @keyframes ink{0%{transform:scale(.7) rotate(-8deg);opacity:0}65%{transform:scale(1.08) rotate(2deg)}100%{transform:scale(1)}}

  /* ---------- fill-in-the-blank printed lines ---------- */
  .blanks{margin-top:13px;display:grid;grid-template-columns:1fr 1fr;gap:9px 14px}
  .blank{display:flex;flex-direction:column;gap:1px;cursor:pointer}
  .blank .k{
    font-family:"Spline Sans Mono",monospace;font-size:8px;letter-spacing:2.4px;text-transform:uppercase;
    color:var(--ink-soft);
  }
  .blank .v{
    font-family:"Fraunces",serif;font-weight:500;font-size:18px;color:var(--ink);line-height:1.05;
    border-bottom:1.4px dotted var(--ink);padding-bottom:2px;min-height:23px;
    display:flex;align-items:baseline;gap:5px;
    font-variation-settings:"opsz" 40;
  }
  .blank .v small{font-family:"Spline Sans Mono",monospace;font-weight:500;font-size:10px;color:var(--ink-soft);letter-spacing:.5px}
  .swatch{display:inline-block;width:11px;height:11px;border-radius:2px;border:1px solid rgba(0,0,0,.3);transform:translateY(1px)}

  /* lure full-width row */
  .blank.wide{grid-column:1 / -1}
  .lure-v{display:flex;align-items:center;gap:8px}
  .lure-v .plus{font-family:"Fraunces",serif;font-weight:600;color:var(--ink-soft)}

  /* ---------- KEPT/RELEASED big stamp toggle ---------- */
  .verdict{
    margin-top:13px;display:flex;gap:9px;align-items:stretch;
  }
  .vbtn{
    flex:1;border:1.6px solid var(--rule);border-radius:6px;background:transparent;cursor:pointer;
    padding:9px 6px 8px;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;
  }
  .vbtn .word{
    font-family:"Fraunces",serif;font-weight:900;font-size:21px;letter-spacing:1px;color:#a99c7c;
    font-variation-settings:"opsz" 90;
  }
  .vbtn .tick{font-family:"Spline Sans Mono",monospace;font-size:7.5px;letter-spacing:2px;color:#a99c7c;text-transform:uppercase}
  .vbtn.kept.on{
    border-color:var(--green);background:rgba(47,107,70,.08);
    box-shadow:0 0 0 1.4px rgba(47,107,70,.22) inset;
  }
  .vbtn.kept.on .word{color:var(--green)}
  .vbtn.kept.on .tick{color:var(--green)}
  .vbtn.rel.on{
    border-color:var(--slate);background:rgba(45,111,158,.08);
    box-shadow:0 0 0 1.4px rgba(45,111,158,.22) inset;
  }
  .vbtn.rel.on .word{color:var(--slate)}
  .vbtn.rel.on .tick{color:var(--slate)}
  /* inked stamp ring on active verdict */
  .vbtn.on::after{
    content:"";position:absolute;right:7px;top:6px;width:15px;height:15px;border-radius:50%;
    border:1.5px solid currentColor;color:inherit;opacity:.42;
    animation:ink .45s .55s cubic-bezier(.2,1.6,.3,1) both;
  }
  .vbtn.kept.on::after{border-color:var(--green)}
  .vbtn.rel.on::after{border-color:var(--slate)}

  /* ---------- foot: GPS + area monospace stamp ---------- */
  .foot{
    margin-top:12px;border-top:1.2px solid var(--ink);padding-top:7px;
    display:flex;align-items:center;justify-content:space-between;gap:8px;
  }
  .foot .area{display:flex;align-items:center;gap:6px}
  .foot .pin{width:13px;height:13px;color:var(--verm)}
  .foot .area b{font-family:"Fraunces",serif;font-weight:700;font-size:14px;color:var(--ink);font-variation-settings:"opsz" 40}
  .foot .gps{
    font-family:"Spline Sans Mono",monospace;font-size:8.5px;letter-spacing:.4px;color:var(--ink-soft);
    text-align:right;line-height:1.45;
  }
  .foot .gps .lock{color:var(--green)}

  /* ---------- TAG IT button (press a stamp) ---------- */
  .tagit{
    position:absolute;left:50%;bottom:30px;transform:translateX(-50%);z-index:30;
    width:330px;height:62px;border:none;border-radius:13px;cursor:pointer;
    background:var(--verm);
    color:#fbeee6;
    font-family:"Fraunces",serif;font-weight:900;font-size:23px;letter-spacing:3px;
    display:flex;align-items:center;justify-content:center;gap:12px;
    box-shadow:0 10px 22px rgba(143,30,18,.5), 0 2px 0 #9c2b1e inset, 0 -3px 0 rgba(0,0,0,.18) inset;
    text-transform:uppercase;
    font-variation-settings:"opsz" 110;
  }
  .tagit:active{transform:translateX(-50%) translateY(3px);box-shadow:0 4px 12px rgba(143,30,18,.5),0 2px 0 #9c2b1e inset}
  .tagit svg{width:22px;height:22px}
  .tagit .micro{
    position:absolute;right:16px;bottom:7px;font-family:"Spline Sans Mono",monospace;
    font-weight:500;font-size:7.5px;letter-spacing:1.5px;color:rgba(251,238,230,.7);
  }
</style>
</head>
<body>
  <div class="device">
    <div class="screen">
      <div class="notch"></div>

      <!-- status bar -->
      <div class="status">
        <span>9:41</span>
        <div class="dots">
          <svg width="18" height="12" viewBox="0 0 18 12"><g fill="#e9dfc8"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1" opacity=".4"/></g></svg>
          <svg width="22" height="12" viewBox="0 0 22 12"><rect x="0.5" y="0.5" width="18" height="11" rx="3" fill="none" stroke="#e9dfc8" opacity=".8"/><rect x="2" y="2" width="13" height="8" rx="1.5" fill="#e9dfc8"/><rect x="20" y="4" width="2" height="4" rx="1" fill="#e9dfc8" opacity=".8"/></svg>
        </div>
      </div>

      <!-- desk header -->
      <div class="deskhead">
        <span class="back">
          <svg width="9" height="15" viewBox="0 0 9 15" fill="none"><path d="M8 1L1.5 7.5L8 14" stroke="#cdc1a1" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          TRIP · OAHE
        </span>
        <span class="eyebrow">Catch #47</span>
      </div>

      <div class="ring"></div>

      <!-- THE TAG -->
      <div class="tag-wrap">
        <!-- twine -->
        <svg class="twine" viewBox="0 0 80 46" fill="none">
          <path d="M40 44 C 24 30, 20 16, 33 4" stroke="#9c8a5f" stroke-width="2.4" stroke-linecap="round"/>
          <path d="M40 44 C 56 30, 60 16, 47 4" stroke="#b7a572" stroke-width="2.4" stroke-linecap="round"/>
          <path d="M33 4 C 38 0, 42 0, 47 4" stroke="#a8966b" stroke-width="2.4" stroke-linecap="round"/>
        </svg>

        <div class="tag" id="tag">
          <div class="tag-hole"></div>

          <div class="tag-top">
            <div class="lockup">
              <div class="tag-title">FIELD&nbsp;TAG</div>
              <div class="tag-sub">Lake Oahe &middot; S.&nbsp;Dakota</div>
            </div>
            <div class="serial">
              <div>NO. 0047</div>
              <div>06·23·26</div>
              <span class="reg"></span>
            </div>
          </div>

          <div class="hr"></div>

          <div class="core">
            <!-- MEASURING BOARD RULER -->
            <div class="board" id="board">
              <div class="bumphead">BUMP</div>
              <svg viewBox="0 0 62 300" preserveAspectRatio="none" id="ticks"></svg>
              <div class="fishmark" id="fishmark">
                <div class="bar"></div>
                <div class="knob">
                  <svg viewBox="0 0 24 14" fill="none">
                    <path d="M2 7 C6 2, 14 2, 18 7 C14 12, 6 12, 2 7 Z" fill="#fff"/>
                    <path d="M18 7 L23 3 L23 11 Z" fill="#fff"/>
                    <circle cx="6.5" cy="6.5" r="1.1" fill="#cf3b2a"/>
                  </svg>
                </div>
              </div>
            </div>

            <!-- READOUT + FIELDS -->
            <div class="right">
              <div class="readout">
                <span class="num">18</span><span class="frac">½</span><span class="in">IN</span>
              </div>
              <div class="lenlabel">Length · drag the board</div>
              <div class="stepper">
                <button aria-label="minus quarter inch">−¼</button>
                <button aria-label="plus quarter inch">+¼</button>
              </div>

              <div class="species">
                <div class="lab">Species — ink one</div>
                <div class="stamps">
                  <div class="stamp on" title="Walleye">
                    <svg viewBox="0 0 24 14" fill="currentColor"><path d="M1 7 C4 3, 12 1, 17 4 C18.5 5, 19 6, 19.2 7 C19 8, 18.5 9, 17 10 C12 13, 4 11, 1 7 Z"/><path d="M17 7 L23 3.5 L23 10.5 Z"/><circle cx="5.2" cy="6.4" r="1.1" fill="#efe7d3"/></svg>
                  </div>
                  <div class="stamp" title="Sauger">
                    <svg viewBox="0 0 24 14" fill="currentColor"><path d="M2 7 C6 4, 12 3, 16 5 C17 5.6, 17.4 6.3, 17.5 7 C17.4 7.7, 17 8.4, 16 9 C12 11, 6 10, 2 7 Z"/><path d="M16 7 L22 4 L22 10 Z"/></svg>
                  </div>
                  <div class="stamp" title="Pike">
                    <svg viewBox="0 0 24 14" fill="currentColor"><path d="M1 7 C7 4, 13 4, 18 6 L18 8 C13 10, 7 10, 1 7 Z"/><path d="M18 7 L23 4.5 L23 9.5 Z"/></svg>
                  </div>
                  <div class="stamp" title="Smallmouth">
                    <svg viewBox="0 0 24 14" fill="currentColor"><path d="M2 7 C5 4, 11 2.5, 16 4.5 C18 5.3, 18.6 6, 18.8 7 C18.6 8, 18 8.7, 16 9.5 C11 11.5, 5 10, 2 7 Z"/><path d="M16.5 7 L22 4 L22 10 Z"/></svg>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- fill-in-the-blank printed lines -->
          <div class="blanks">
            <div class="blank wide">
              <span class="k">Lure — color 1 / color 2</span>
              <span class="v lure-v">
                <span class="swatch" style="background:#c9d646"></span>Chartreuse
                <span class="plus">/</span>
                <span class="swatch" style="background:#5b3b86"></span>Purple
              </span>
            </div>
            <div class="blank">
              <span class="k">Depth</span>
              <span class="v">22 <small>ft</small></span>
            </div>
            <div class="blank">
              <span class="k">Water Temp</span>
              <span class="v">64 <small>°F</small></span>
            </div>
            <div class="blank">
              <span class="k">Angler</span>
              <span class="v">Tyler</span>
            </div>
            <div class="blank">
              <span class="k">Bait</span>
              <span class="v">Crawler</span>
            </div>
          </div>

          <!-- KEPT / RELEASED big stamps -->
          <div class="verdict">
            <button class="vbtn kept on">
              <span class="word">KEEP</span>
              <span class="tick">in the box</span>
            </button>
            <button class="vbtn rel">
              <span class="word">RELEASE</span>
              <span class="tick">back she goes</span>
            </button>
          </div>

          <!-- foot: area + frozen GPS -->
          <div class="foot">
            <span class="area">
              <svg class="pin" viewBox="0 0 12 16" fill="currentColor"><path d="M6 0C2.7 0 0 2.7 0 6c0 4.2 6 10 6 10s6-5.8 6-10c0-3.3-2.7-6-6-6z"/><circle cx="6" cy="6" r="2.3" fill="#efe7d3"/></svg>
              <b>North Flat</b>
            </span>
            <span class="gps">
              44.456789, −100.345678<br>
              <span class="lock">● locked</span> &nbsp;±4 m
            </span>
          </div>
        </div>
      </div>

      <!-- TAG IT -->
      <button class="tagit">
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 12l4.5 4.5L19 6.5" stroke="#fbeee6" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        TAG&nbsp;IT
        <span class="micro">stamps + saves</span>
      </button>
    </div>
  </div>

<script>
  // Build the measuring-board tick marks (inches) and place the fish marker for 18.5".
  (function(){
    var svg = document.getElementById('ticks');
    if(!svg) return;
    var W = 62, H = 300, headH = 16;
    var topIn = 30, botIn = 6;          // ruler spans 6"(bottom) .. 30"(top)
    var span = topIn - botIn;
    var usable = H - headH - 6;
    function yFor(inch){ return headH + 3 + (topIn - inch) / span * usable; }
    var ns = 'http://www.w3.org/2000/svg', parts = '';
    for(var i = botIn; i <= topIn; i++){
      var y = yFor(i).toFixed(1);
      var major = (i % 5 === 0);
      var len = major ? 22 : (i % 1 === 0 ? 12 : 7);
      parts += '<line x1="'+(W-len)+'" y1="'+y+'" x2="'+(W-2)+'" y2="'+y+'" stroke="#18283f" stroke-width="'+(major?1.5:1)+'" opacity="'+(major?.95:.6)+'"/>';
      if(major){
        parts += '<text x="'+(W-len-3)+'" y="'+(parseFloat(y)+3.2)+'" text-anchor="end" font-family="Saira Semi Condensed, sans-serif" font-weight="600" font-size="9" fill="#18283f">'+i+'</text>';
      }
    }
    // half-inch ticks
    for(var h = botIn+0.5; h < topIn; h += 1){
      var yy = yFor(h).toFixed(1);
      parts += '<line x1="'+(W-7)+'" y1="'+yy+'" x2="'+(W-2)+'" y2="'+yy+'" stroke="#18283f" stroke-width="0.8" opacity="0.4"/>';
    }
    svg.innerHTML = parts;

    // position the fish marker for current length (18.5")
    var current = 18.5;
    var fm = document.getElementById('fishmark');
    var y = yFor(current);
    fm.style.top = (y - 17) + 'px';   // marker is 34px tall, center on tick
  })();
</script>
</body>
</html>
