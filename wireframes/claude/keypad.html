<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FishingLogger - Log Catch / Keypad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Spline+Sans+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --page:#101216;
    --slate:#15181d;
    --slate-2:#1b1f26;
    --panel:#1e232b;
    --panel-2:#262c35;
    --raise:#2c333d;
    --ink:#f6f8fa;
    --muted:#9aa6b2;
    --faint:#6b7682;
    --line:#323a45;
    --line-2:#3d4854;
    --hi:#ffd400;        /* safety yellow - primary value + save */
    --hi-ink:#1a1500;
    --orange:#ff6a00;    /* hi-vis secondary accent */
    --green:#2fd38a;
    --green-ink:#04241a;
    --release:#48c2ff;
    --release-ink:#012437;
    --shadow:0 18px 40px rgba(0,0,0,.5);
    --press:inset 0 3px 0 rgba(0,0,0,.35), inset 0 -2px 0 rgba(255,255,255,.04);
    --raise-fx:0 6px 0 rgba(0,0,0,.45), inset 0 2px 0 rgba(255,255,255,.07);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;min-height:100%;}
  body{
    background:
      radial-gradient(circle at 50% -8%, #1b2129, transparent 46%),
      var(--page);
    color:var(--ink);
    font-family:"Archivo",-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    padding:22px 0 30px;
  }

  /* ---- iPhone frame: EXACTLY 390x844 ---- */
  .phone{
    width:390px;
    height:844px;
    flex:0 0 844px;
    position:relative;
    border-radius:56px;
    background:linear-gradient(180deg,#0c0e12,#070809);
    box-shadow:0 0 0 11px #1c1f24,0 0 0 13px #2c313a,0 34px 80px rgba(0,0,0,.62);
  }

  .notch{
    position:absolute;
    z-index:6;
    top:11px;
    left:50%;
    width:124px;
    height:34px;
    transform:translateX(-50%);
    border-radius:20px;
    background:#000;
  }

  /* ---- inner screen: EXACTLY 390x844, no scroll, no clip ---- */
  .screen{
    position:absolute;
    inset:0;
    width:390px;
    height:844px;
    border-radius:56px;
    background:
      radial-gradient(circle at 50% 4%, rgba(255,212,0,.06), transparent 30%),
      linear-gradient(180deg,var(--slate) 0%,#0e1115 100%);
    display:flex;
    flex-direction:column;
  }

  .statusbar{
    flex:0 0 52px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 32px 0 36px;
    font-size:14px;
    font-weight:700;
    font-family:"Spline Sans Mono",monospace;
  }
  .statusbar .right{display:flex;gap:8px;align-items:center;}
  .signal{width:18px;height:11px;display:grid;grid-template-columns:repeat(4,1fr);gap:2px;align-items:end;}
  .signal i{display:block;width:3px;border-radius:1px;background:var(--ink);}
  .signal i:nth-child(1){height:4px;}
  .signal i:nth-child(2){height:6px;}
  .signal i:nth-child(3){height:9px;}
  .signal i:nth-child(4){height:11px;}
  .battery{width:25px;height:12px;border:1.8px solid var(--ink);border-radius:3px;position:relative;}
  .battery:before{content:"";position:absolute;right:-4px;top:3px;width:2px;height:6px;border-radius:2px;background:var(--ink);}
  .battery:after{content:"";position:absolute;left:2px;top:2px;bottom:2px;width:16px;border-radius:1px;background:var(--green);}

  .app{
    flex:1 1 auto;
    display:flex;
    flex-direction:column;
    padding:4px 16px 14px;
    min-height:0;
  }

  /* ---- header ---- */
  .topbar{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:2px 2px 8px;
  }
  .title{display:flex;align-items:center;gap:11px;}
  .title .x{
    width:38px;height:38px;border-radius:12px;
    background:var(--panel);border:1px solid var(--line);
    display:grid;place-items:center;color:var(--muted);
    box-shadow:var(--raise-fx);
  }
  .title h1{
    margin:0;font-size:21px;font-weight:800;letter-spacing:-.3px;line-height:1;
  }
  .title h1 small{
    display:block;margin-top:3px;font-family:"Spline Sans Mono",monospace;
    font-size:9.5px;font-weight:600;letter-spacing:1.4px;color:var(--faint);text-transform:uppercase;
  }
  .gps-pill{
    display:flex;align-items:center;gap:6px;
    height:34px;padding:0 12px;border-radius:11px;
    background:var(--panel);border:1px solid var(--line);
    font-family:"Spline Sans Mono",monospace;font-size:10px;font-weight:700;
    letter-spacing:.6px;color:var(--release);text-transform:uppercase;
    box-shadow:var(--raise-fx);
  }
  .gps-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--release);box-shadow:0 0 0 3px rgba(72,194,255,.2);}

  /* ---- LENGTH hero readout ---- */
  .length-block{
    flex:0 0 auto;
    margin-top:8px;
    border-radius:24px;
    background:linear-gradient(180deg,var(--slate-2),#131720);
    border:1px solid var(--line);
    box-shadow:var(--shadow);
    padding:14px 18px 16px;
    position:relative;
    overflow:visible;
  }
  .length-head{
    display:flex;align-items:center;justify-content:space-between;
  }
  .length-head .lbl{
    font-family:"Spline Sans Mono",monospace;
    font-size:11px;font-weight:700;letter-spacing:2.4px;color:var(--muted);text-transform:uppercase;
  }
  .length-head .primary-tag{
    font-family:"Spline Sans Mono",monospace;
    font-size:9px;font-weight:700;letter-spacing:1.4px;
    color:var(--hi-ink);background:var(--hi);
    padding:4px 8px;border-radius:7px;text-transform:uppercase;
  }
  .readout{
    display:flex;align-items:baseline;justify-content:center;gap:8px;
    margin:4px 0 2px;
  }
  .readout .num{
    font-size:128px;line-height:.82;font-weight:900;
    letter-spacing:-4px;color:var(--hi);
    font-variant-numeric:tabular-nums;
    text-shadow:0 6px 24px rgba(255,212,0,.22);
    font-stretch:expanded;
  }
  .readout .unit{
    font-size:30px;font-weight:800;color:var(--muted);letter-spacing:-.5px;
    transform:translateY(-6px);
  }

  /* ---- giant +/- pads + quick chips ---- */
  .padrow{
    display:grid;
    grid-template-columns:104px 1fr 104px;
    gap:12px;
    margin-top:12px;
  }
  .pad{
    height:104px;
    border-radius:20px;
    border:1px solid var(--line-2);
    background:linear-gradient(180deg,var(--raise),#1c2128);
    box-shadow:var(--raise-fx);
    display:grid;place-items:center;
    position:relative;
  }
  .pad.minus{background:linear-gradient(180deg,#2a3038,#1c2128);}
  .pad svg{width:46px;height:46px;}
  .pad .step-cap{
    position:absolute;bottom:9px;left:0;right:0;text-align:center;
    font-family:"Spline Sans Mono",monospace;font-size:9px;font-weight:700;
    letter-spacing:.8px;color:var(--faint);
  }
  .pad.plus{
    background:linear-gradient(180deg,#3a3206,#241f02);
    border-color:rgba(255,212,0,.4);
  }
  .pad.plus svg{color:var(--hi);}
  .pad.plus .step-cap{color:rgba(255,212,0,.7);}
  .pad.held{box-shadow:var(--press);transform:translateY(3px);}

  .quickwrap{
    display:flex;flex-direction:column;gap:8px;justify-content:center;
  }
  .quick-lbl{
    font-family:"Spline Sans Mono",monospace;font-size:8.5px;font-weight:700;
    letter-spacing:1.4px;color:var(--faint);text-transform:uppercase;text-align:center;
  }
  .chips{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
  .chip{
    height:54px;border-radius:13px;
    border:1px solid var(--line);background:var(--panel-2);
    display:grid;place-items:center;
    font-size:18px;font-weight:800;color:var(--ink);letter-spacing:-.5px;
    box-shadow:var(--raise-fx);
    font-variant-numeric:tabular-nums;
  }
  .chip.active{
    background:linear-gradient(180deg,#fff0a3,var(--hi));
    color:var(--hi-ink);border-color:#fff;
    box-shadow:0 0 0 2px rgba(255,212,0,.3),var(--raise-fx);
  }

  /* ---- KEPT / RELEASED split toggle ---- */
  .split{
    flex:0 0 auto;
    margin-top:12px;
    display:grid;grid-template-columns:1fr 1fr;gap:8px;
    padding:7px;border-radius:20px;
    background:var(--slate-2);border:1px solid var(--line);
    box-shadow:var(--press);
  }
  .split button{
    height:74px;border:0;border-radius:14px;cursor:pointer;
    font-family:"Archivo",sans-serif;
    display:flex;align-items:center;justify-content:center;gap:11px;
    font-size:25px;font-weight:900;letter-spacing:-.4px;
    color:var(--faint);background:transparent;
  }
  .split button svg{width:30px;height:30px;}
  .split .kept.on{
    background:linear-gradient(180deg,#3ee79c,var(--green));
    color:var(--green-ink);box-shadow:var(--raise-fx);
  }
  .split .released.on{
    background:linear-gradient(180deg,#6fd0ff,var(--release));
    color:var(--release-ink);box-shadow:var(--raise-fx);
  }

  /* ---- species + depth row ---- */
  .midrow{
    flex:0 0 auto;
    margin-top:12px;
    display:grid;grid-template-columns:1fr 152px;gap:10px;
  }
  .species{
    border-radius:18px;border:1px solid var(--line);
    background:linear-gradient(180deg,var(--panel),#171b22);
    box-shadow:var(--raise-fx);
    padding:11px 15px;
    display:flex;flex-direction:column;justify-content:center;gap:5px;
  }
  .species .lbl,.depth .lbl{
    font-family:"Spline Sans Mono",monospace;font-size:9px;font-weight:700;
    letter-spacing:1.6px;color:var(--faint);text-transform:uppercase;
  }
  .species .val{
    display:flex;align-items:center;gap:10px;
    font-size:26px;font-weight:800;letter-spacing:-.4px;
  }
  .species .val svg{width:30px;height:30px;color:var(--orange);}
  .species .caret{margin-left:auto;color:var(--faint);}

  .depth{
    border-radius:18px;border:1px solid var(--line);
    background:var(--slate-2);
    padding:9px 9px;
    display:grid;grid-template-rows:auto 1fr;gap:5px;
  }
  .depth .lbl{text-align:center;}
  .depth .ctrls{display:grid;grid-template-columns:44px 1fr 44px;gap:7px;align-items:center;}
  .depth .dbtn{
    height:50px;border-radius:12px;border:1px solid var(--line-2);
    background:linear-gradient(180deg,var(--raise),#1c2128);
    display:grid;place-items:center;box-shadow:var(--raise-fx);
  }
  .depth .dbtn svg{width:24px;height:24px;color:var(--muted);}
  .depth .dval{
    text-align:center;font-weight:900;font-size:25px;letter-spacing:-1px;
    font-variant-numeric:tabular-nums;
  }
  .depth .dval b{font-size:25px;}
  .depth .dval span{font-size:13px;color:var(--faint);font-weight:700;margin-left:2px;}

  /* ---- quiet pre-filled summary ---- */
  .summary{
    flex:0 0 auto;
    margin-top:11px;
    display:flex;align-items:center;gap:9px;
    padding:11px 14px;border-radius:15px;
    background:rgba(255,255,255,.025);
    border:1px dashed var(--line-2);
  }
  .summary .sw{display:flex;gap:-3px;align-items:center;}
  .summary .swatch{
    width:17px;height:17px;border-radius:5px;border:1.5px solid rgba(255,255,255,.5);
  }
  .summary .swatch.chartreuse{background:#caff2e;}
  .summary .swatch.purple{background:#7b5cff;margin-left:-5px;}
  .summary .txt{
    flex:1 1 auto;min-width:0;
    font-family:"Spline Sans Mono",monospace;
    font-size:10.5px;font-weight:600;line-height:1.45;color:var(--muted);
    letter-spacing:.1px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .summary .txt b{color:var(--ink);font-weight:700;}
  .summary .edit{
    flex:0 0 auto;color:var(--faint);
    font-family:"Spline Sans Mono",monospace;font-size:9px;font-weight:700;
    letter-spacing:1px;text-transform:uppercase;
  }
  .summary .edit svg{width:15px;height:15px;vertical-align:-3px;}

  /* ---- SAVE ---- */
  .save{
    flex:0 0 auto;
    margin-top:auto;
    height:82px;border:0;border-radius:22px;cursor:pointer;
    font-family:"Archivo",sans-serif;
    background:linear-gradient(180deg,#ffe04a,var(--hi));
    color:var(--hi-ink);
    box-shadow:0 8px 0 #b89700, 0 16px 30px rgba(255,212,0,.3);
    display:flex;align-items:center;justify-content:center;gap:14px;
    margin-bottom:2px;
  }
  .save .ico{width:34px;height:34px;display:grid;place-items:center;
    background:rgba(0,0,0,.16);border-radius:11px;}
  .save .ico svg{width:22px;height:22px;}
  .save .lines{display:flex;flex-direction:column;align-items:flex-start;gap:2px;line-height:1;}
  .save .lines .big{font-size:25px;font-weight:900;letter-spacing:-.5px;}
  .save .lines .sub{
    font-family:"Spline Sans Mono",monospace;font-size:10px;font-weight:700;
    letter-spacing:.4px;opacity:.72;
  }

  .caption{
    width:390px;text-align:center;
    font-family:"Spline Sans Mono",monospace;
    font-size:12px;font-weight:600;letter-spacing:.4px;color:#7e8995;
  }
  .caption b{color:#cbd4dd;font-weight:700;}
</style>
</head>
<body>
  <main class="phone" aria-label="FishingLogger Log Catch - Keypad concept">
    <div class="notch"></div>
    <div class="screen" id="screen">

      <div class="statusbar">
        <span>9:41</span>
        <span class="right">
          <span class="signal" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
          <span style="font-size:11px;">5G</span>
          <span class="battery" aria-hidden="true"></span>
        </span>
      </div>

      <section class="app">
        <header class="topbar">
          <div class="title">
            <div class="x" aria-label="Cancel">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
            </div>
            <h1>Log Catch<small>Lake Oahe &middot; prefilled</small></h1>
          </div>
          <div class="gps-pill">
            <span class="dot" aria-hidden="true"></span>GPS FROZEN
          </div>
        </header>

        <!-- LENGTH HERO -->
        <section class="length-block" aria-label="Length, primary value">
          <div class="length-head">
            <span class="lbl">Length</span>
            <span class="primary-tag">Inches</span>
          </div>
          <div class="readout">
            <span class="num">18.5</span>
            <span class="unit">in</span>
          </div>

          <div class="padrow">
            <div class="pad minus" aria-label="Decrease length quarter inch">
              <svg viewBox="0 0 24 24" fill="none" stroke="#cdd6df" stroke-width="3" stroke-linecap="round"><path d="M5 12h14"/></svg>
              <span class="step-cap">- 0.25  HOLD</span>
            </div>
            <div class="quickwrap">
              <span class="quick-lbl">Quick size &middot; one tap</span>
              <div class="chips">
                <div class="chip">14</div>
                <div class="chip">16</div>
                <div class="chip active">18</div>
                <div class="chip">20</div>
                <div class="chip">22</div>
              </div>
            </div>
            <div class="pad plus" aria-label="Increase length quarter inch">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
              <span class="step-cap">+ 0.25  HOLD</span>
            </div>
          </div>
        </section>

        <!-- KEPT / RELEASED -->
        <section class="split" aria-label="Kept or Released">
          <button class="kept on" aria-pressed="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
            KEPT
          </button>
          <button class="released" aria-pressed="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12c3-5 7-7 9-7 3 0 5 3 5 5"/><path d="M21 12c-3 5-7 7-9 7-3 0-5-3-5-5"/><path d="M14 9l3 3-3 3"/></svg>
            RELEASED
          </button>
        </section>

        <!-- SPECIES + DEPTH -->
        <section class="midrow">
          <div class="species" aria-label="Species">
            <span class="lbl">Species</span>
            <div class="val">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 12c3-4 8-6 12-6 2 0 4 .6 5.5 1.6L19 9l2 1-2 1 1.5 1.4C18 14 16 14.5 14 14.5c-4 0-9-2-11-2.5zM6 11.5a1 1 0 100-.0001z"/><circle cx="6.5" cy="11.2" r="1" fill="#15181d"/><path d="M3 12c-1 1.2-1.6 2.4-1.8 3.4 1.2-.3 2.3-1 3.2-2z" /></svg>
              Walleye
              <span class="caret" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
              </span>
            </div>
          </div>
          <div class="depth" aria-label="Depth in feet">
            <span class="lbl">Depth</span>
            <div class="ctrls">
              <div class="dbtn" aria-label="Decrease depth">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M5 12h14"/></svg>
              </div>
              <div class="dval"><b>22</b><span>ft</span></div>
              <div class="dbtn" aria-label="Increase depth">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
              </div>
            </div>
          </div>
        </section>

        <!-- QUIET SUMMARY -->
        <section class="summary" aria-label="Other prefilled details">
          <span class="sw" aria-hidden="true">
            <span class="swatch chartreuse"></span>
            <span class="swatch purple"></span>
          </span>
          <span class="txt"><b>Chartreuse + Purple</b> &middot; 64&deg;F &middot; crawler &middot; <b>North Flat</b> &middot; 44.4568,-100.3457 &plusmn;4m</span>
          <span class="edit" aria-label="Edit details">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg>
            EDIT
          </span>
        </section>

        <!-- SAVE -->
        <button class="save" aria-label="Save catch: Tyler walleye 18.5 inches kept">
          <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>
          <span class="lines">
            <span class="big">SAVE CATCH</span>
            <span class="sub">TYLER &middot; WALLEYE &middot; 18.5" &middot; KEPT</span>
          </span>
        </button>

      </section>
    </div>
  </main>

  <p class="caption"><b>KEYPAD</b> &mdash; big targets, eyes-free</p>
</body>
</html>
