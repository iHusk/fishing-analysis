<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Lake Oahe · Jun 18-20 2026 · Replay</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root{
    --bg:#05080d; --panel:rgba(12,18,28,.82); --panel-solid:#0c1623;
    --stroke:rgba(255,255,255,.10); --text:#eaf2ff; --muted:#9fb2c9;
    --gold:#ffd24d; --accent:#36c5ff; --good:#5cffb1; --warn:#ff7b54;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    color:var(--text);overflow:hidden;-webkit-text-size-adjust:100%}
  #map{position:absolute;inset:0;background:#0b1a2b}  /* deep water so zoom gaps don't flash black */
  /* dawn->dusk mood wash + drifting water caustics + vignette, all under the glass panels */
  #sky{position:absolute;inset:0;z-index:400;pointer-events:none;mix-blend-mode:soft-light;
    opacity:0;transition:background 1.2s linear,opacity 1.2s linear}
  #shimmer{position:absolute;inset:-20%;z-index:401;pointer-events:none;opacity:0;
    transition:opacity 1s linear;mix-blend-mode:overlay;
    background:
      radial-gradient(40% 30% at 20% 30%,rgba(255,255,255,.10),transparent 60%),
      radial-gradient(35% 25% at 70% 60%,rgba(120,200,255,.10),transparent 60%),
      radial-gradient(30% 22% at 45% 80%,rgba(255,255,255,.07),transparent 60%);
    animation:drift 26s ease-in-out infinite alternate}
  #shimmer.on{opacity:1}
  @keyframes drift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(2.5%,-2%) scale(1.05)}
    100%{transform:translate(-2%,2.5%) scale(1.02)}}
  #vignette{position:absolute;inset:0;z-index:402;pointer-events:none;
    background:radial-gradient(120% 120% at 50% 45%,transparent 55%,rgba(0,0,0,.45) 100%)}
  .leaflet-container{background:#0b1a2b;font-family:inherit}
  .leaflet-tile-pane{transition:filter 1.2s linear}
  .leaflet-control-attribution{background:rgba(0,0,0,.4)!important;color:#7d8ea3!important}
  .leaflet-control-attribution a{color:#9fb2c9!important}

  /* ---- glassy panels ---- */
  .panel{position:absolute;z-index:1000;background:var(--panel);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid var(--stroke);border-radius:16px;
    box-shadow:0 10px 40px rgba(0,0,0,.5);padding:14px 16px;
    transition:background .25s linear}
  /* PERF: while the map is moving (playback), drop the expensive backdrop blur + caustics and
     make panels solid-readable; the pretty blur/shimmer return the instant you pause. */
  body.playing .panel{backdrop-filter:none;-webkit-backdrop-filter:none;background:rgba(10,15,23,.93)}
  body.playing #shimmer{opacity:0}
  .title{top:16px;left:16px;max-width:46vw}
  .title h1{margin:0;font-size:17px;font-weight:700;letter-spacing:.2px}
  .title .sub{margin-top:2px;font-size:11px;color:var(--muted)}
  .title .cap{margin-top:4px;font-size:12px;color:var(--gold);font-weight:600}

  .hud{top:16px;left:50%;transform:translateX(-50%);display:flex;gap:16px;
    padding:10px 18px;align-items:center}
  .hud .stat{text-align:center;min-width:50px}
  .hud .stat .v{font-size:18px;font-weight:750;line-height:1}
  .hud .stat .v small{font-size:11px;font-weight:600;color:var(--muted)}
  .hud .stat .k{font-size:10px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.6px;margin-top:3px}
  .hud .stat.brag .v{color:var(--gold)}
  .hud .sep{width:1px;height:30px;background:var(--stroke)}

  .tools{top:16px;right:16px;display:flex;flex-direction:column;gap:8px;
    padding:10px;align-items:stretch}
  .tools button{all:unset;cursor:pointer;font-size:12px;font-weight:600;color:var(--text);
    padding:8px 12px;border-radius:10px;background:rgba(255,255,255,.06);
    border:1px solid var(--stroke);text-align:center;white-space:nowrap;
    transition:background .15s,color .15s,transform .1s}
  .tools button:hover{background:rgba(255,255,255,.14);transform:translateY(-1px)}
  .tools button:active{transform:translateY(0) scale(.97)}
  .tools button.on{background:var(--accent);color:#02121d;border-color:transparent}

  .legend{bottom:150px;right:16px;padding:12px 14px;font-size:12px;max-width:230px}
  .legend .lg-title{font-size:10px;text-transform:uppercase;letter-spacing:.6px;
    color:var(--muted);margin:0 0 6px}
  .legend .row{display:flex;align-items:center;gap:8px;margin:5px 0}
  .legend .dot{width:12px;height:12px;border-radius:50%;flex:0 0 auto;
    box-shadow:0 0 8px rgba(0,0,0,.6)}
  .legend .ln{width:18px;height:4px;border-radius:3px;flex:0 0 auto}
  .legend .days{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .legend .heatbar{height:8px;border-radius:4px;margin:4px 0 2px;
    background:linear-gradient(90deg,#1f6f8b,#5cffb1,#ffd24d,#ff4d4d)}
  .legend .heatcap{display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}
  .legend .heatfilter{font-size:10px;color:var(--muted);margin:6px 0 4px;line-height:1.3}
  .legend .heattoggle{cursor:pointer;font-size:10px;font-weight:600;padding:3px 8px;
    border-radius:999px;border:1px solid rgba(255,255,255,.25);background:transparent;
    color:var(--fg);width:100%}
  .legend .heattoggle.on{background:#ffd24d;color:#1a1a1a;border-color:#ffd24d}
  #heatLegend{display:none}
  .chip{cursor:pointer;font-size:11px;font-weight:600;padding:4px 9px;border-radius:999px;
    border:1px solid var(--stroke);background:rgba(255,255,255,.05);color:var(--text);
    user-select:none;transition:opacity .15s}
  .chip.off{opacity:.3;text-decoration:line-through}

  /* ---- transport / timeline ---- */
  .transport{left:16px;right:16px;bottom:16px;display:flex;align-items:center;gap:14px;
    padding:12px 16px}
  .playbtn{all:unset;cursor:pointer;width:46px;height:46px;border-radius:50%;
    flex:0 0 auto;display:grid;place-items:center;
    background:linear-gradient(145deg,var(--gold),#ff9f1c);color:#1a1300;
    box-shadow:0 6px 22px rgba(255,180,40,.45);font-size:18px;transition:transform .1s}
  .playbtn:active{transform:scale(.94)}
  body.paused .playbtn{animation:breathe 2.4s ease-in-out infinite}
  @keyframes breathe{0%,100%{box-shadow:0 6px 22px rgba(255,180,40,.35)}
    50%{box-shadow:0 6px 30px rgba(255,180,40,.7)}}
  .clock{flex:0 0 auto;min-width:158px}
  .clock .tod{font-size:20px;font-weight:750;line-height:1;font-variant-numeric:tabular-nums}
  .clock .day{font-size:11px;color:var(--muted);margin-top:3px}
  .clock .tele{font-size:11px;color:var(--accent);margin-top:3px;font-variant-numeric:tabular-nums;
    min-height:13px}
  .track-wrap{flex:1;display:flex;flex-direction:column;gap:5px;position:relative}
  #spark{width:100%;height:26px;display:block;border-radius:5px;background:rgba(255,255,255,.04)}
  #phead{position:absolute;top:0;width:2px;background:rgba(255,255,255,.85);
    box-shadow:0 0 8px rgba(255,255,255,.7);pointer-events:none;left:0;
    height:37px;border-radius:2px;will-change:transform}
  .scrub{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:6px;
    background:rgba(255,255,255,.14);outline:none;cursor:pointer;transition:background .1s linear}
  .scrub::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;
    background:#fff;box-shadow:0 0 10px rgba(255,255,255,.7);cursor:pointer}
  .scrub::-moz-range-thumb{width:18px;height:18px;border:none;border-radius:50%;background:#fff;cursor:pointer}
  .marks{position:relative;height:11px}
  .marks .m{position:absolute;top:0;width:9px;height:9px;border-radius:50%;cursor:pointer;
    transform:translateX(-50%);box-shadow:0 0 6px rgba(0,0,0,.7);border:1.5px solid rgba(0,0,0,.45);
    transition:transform .1s}
  .marks .m:hover{transform:translateX(-50%) scale(1.6)}
  .speeds{flex:0 0 auto;display:flex;gap:4px}
  .speeds button{all:unset;cursor:pointer;font-size:11px;font-weight:700;color:var(--muted);
    padding:6px 8px;border-radius:8px;min-width:34px;text-align:center;transition:background .12s}
  .speeds button.on{background:rgba(54,197,255,.2);color:var(--accent)}

  /* ---- catch markers ---- */
  .catch-pin{display:grid;place-items:center}
  .catch-pin .badge{width:30px;height:30px;border-radius:50% 50% 50% 2px;transform:rotate(45deg);
    display:grid;place-items:center;background:rgba(8,14,22,.92);
    border:2.5px solid var(--c,#fff);
    box-shadow:0 3px 10px rgba(0,0,0,.6),0 0 12px var(--c,#fff),0 0 0 3px var(--d,transparent),
      inset 0 1px 2px rgba(255,255,255,.25)}
  .catch-pin .badge.released{border-style:dashed;background:rgba(8,14,22,.55)}
  .catch-pin .emoji{transform:rotate(-45deg);font-size:15px;line-height:1}
  /* REPLAY-2: off-target catches (not target species, not starred) read as quieter glyphs —
     smaller + dimmer so the walleye-first story stays legible, but still visible/clickable. */
  .catch-pin.dim{opacity:.5}
  .catch-pin.dim .badge{width:20px;height:20px;border-width:1.5px;
    box-shadow:0 2px 6px rgba(0,0,0,.5),0 0 6px var(--c,#fff)}
  .catch-pin.dim .emoji{font-size:10px}
  .catch-pin.big .badge{width:40px;height:40px;border-width:3px;border-color:var(--gold);
    box-shadow:0 4px 16px rgba(0,0,0,.7),0 0 26px var(--gold),0 0 0 3px var(--d,transparent)}
  .catch-pin.big .emoji{font-size:19px}
  .catch-pin.big::after{content:"\1F451";position:absolute;top:-16px;font-size:15px;
    filter:drop-shadow(0 1px 2px #000)}
  .catch-pin.pop{animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{0%{transform:scale(0) translateY(-14px);opacity:0}
    60%{transform:scale(1.25) translateY(0);opacity:1}100%{transform:scale(1)}}
  .ripple{position:absolute;left:50%;top:50%;width:14px;height:14px;border-radius:50%;
    transform:translate(-50%,-50%);border:2px solid var(--c,#fff);pointer-events:none;
    animation:ripple 1.1s ease-out forwards}
  @keyframes ripple{0%{opacity:.9;width:14px;height:14px}
    100%{opacity:0;width:120px;height:120px}}
  /* sonar ping fired from the boat on a catch */
  .sonar{display:grid;place-items:center;pointer-events:none}
  .sonar i{position:absolute;border:2px solid var(--good);border-radius:50%;
    width:10px;height:10px;opacity:.0;animation:sonar 1.5s ease-out forwards}
  .sonar i:nth-child(2){animation-delay:.25s}
  @keyframes sonar{0%{width:10px;height:10px;opacity:.85}100%{width:230px;height:230px;opacity:0}}

  /* ---- boat (comet head) ---- */
  .boat{display:grid;place-items:center;pointer-events:none}
  .boat .arrow{width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;
    border-bottom:17px solid var(--c,#fff);
    filter:drop-shadow(0 0 6px var(--c,#fff)) drop-shadow(0 1px 3px #000);
    transition:transform .25s cubic-bezier(.3,1.3,.5,1)}
  .boat .pulse{position:absolute;width:16px;height:16px;border-radius:50%;
    background:var(--c,#fff);opacity:.85;animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 var(--c,#fff)}
    70%{box-shadow:0 0 0 15px transparent}100%{box-shadow:0 0 0 0 transparent}}

  /* ---- popup ---- */
  .leaflet-popup-content-wrapper{background:var(--panel-solid);color:var(--text);
    border-radius:14px;border:1px solid var(--stroke);box-shadow:0 12px 40px rgba(0,0,0,.6)}
  .leaflet-popup-tip{background:var(--panel-solid)}
  .leaflet-popup-content{margin:12px 14px;font-size:13px;line-height:1.45}
  .pc .hd{display:flex;align-items:center;gap:8px;font-weight:750;font-size:15px;margin-bottom:6px}
  .pc .hd .em{font-size:18px}
  .pc .who{font-size:11px;color:var(--muted);font-weight:600;margin-left:auto}
  .pc .crown{color:var(--gold);font-size:11px;font-weight:700;margin-bottom:4px}
  .pc table{border-collapse:collapse;width:100%}
  .pc td{padding:2px 0;vertical-align:top}
  .pc td.k{color:var(--muted);padding-right:10px;white-space:nowrap}
  .pc .tag{display:inline-block;background:rgba(255,255,255,.08);border-radius:6px;
    padding:1px 7px;margin:1px 3px 1px 0;font-size:11px}
  .pc .rel{color:var(--warn);font-weight:600}
  .pc .cond{margin-top:6px;padding-top:6px;border-top:1px solid var(--stroke);
    font-size:11px;color:var(--muted)}
  .pc .cond b{color:var(--accent);font-weight:700}

  .toast{position:absolute;bottom:108px;left:50%;transform:translateX(-50%);z-index:1200;
    background:rgba(8,14,22,.92);border:1px solid var(--stroke);border-radius:10px;
    padding:8px 16px;font-size:13px;color:var(--text);opacity:0;transition:opacity .3s;
    pointer-events:none;max-width:80vw;text-align:center}
  .toast.show{opacity:1}
  /* owner-drawn lake area names, shown with the 'labels' layer */
  .arealabel{pointer-events:none;white-space:nowrap;text-align:center;
    font-size:12px;font-weight:700;letter-spacing:.04em;color:rgba(255,255,255,.94);
    text-transform:uppercase;
    text-shadow:0 0 3px rgba(0,0,0,.95),0 0 6px rgba(0,0,0,.85),0 1px 2px rgba(0,0,0,.9)}
  .toast.big{border-color:var(--gold);box-shadow:0 0 24px rgba(255,210,77,.4);font-weight:700}

  /* ---- title card / end card / wrapped ---- */
  .overlay{position:absolute;inset:0;z-index:1500;display:grid;place-items:center;
    background:radial-gradient(120% 120% at 50% 40%,rgba(5,12,22,.55),rgba(3,6,12,.85));
    backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
    opacity:0;pointer-events:none;transition:opacity .6s ease}
  .overlay.show{opacity:1;pointer-events:auto}
  /* the end recap keeps the (zoomed-to-extents) map visible AND interactive: no blur, soft edge
     vignette, and the overlay is click-through — only the card itself catches pointer events */
  #endOverlay{background:radial-gradient(125% 125% at 50% 50%,transparent 42%,rgba(3,7,14,.62) 100%);
    backdrop-filter:none;-webkit-backdrop-filter:none;align-items:end;padding-bottom:104px}
  #endOverlay.show{pointer-events:none}
  #endOverlay #endCard{pointer-events:auto;position:relative}
  .ecclose{position:absolute;top:8px;right:10px;cursor:pointer;font-size:15px;line-height:1;
    color:var(--muted);background:rgba(255,255,255,.06);border:1px solid var(--stroke);
    border-radius:50%;width:26px;height:26px;display:grid;place-items:center;transition:color .15s,background .15s}
  .ecclose:hover{color:var(--text);background:rgba(255,255,255,.16)}
  .titlecard{text-align:center;transform:translateY(8px);transition:transform .6s ease}
  .overlay.show .titlecard{transform:translateY(0)}
  .titlecard .eyebrow{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--accent)}
  .titlecard h2{margin:8px 0 6px;font-size:34px;font-weight:800;letter-spacing:.5px}
  .titlecard .meta{color:var(--muted);font-size:14px}
  .titlecard .cap{color:var(--gold);font-size:14px;font-weight:600;margin-top:10px}

  .endcard{width:min(520px,86vw);text-align:center;padding:26px 26px 22px}
  .endcard .kik{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
  .endcard h2{margin:6px 0 2px;font-size:26px;font-weight:800}
  .endcard .cap{color:var(--gold);font-weight:600;font-size:14px;margin-bottom:16px}
  .endcard .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:8px 0 18px}
  .endcard .g .v{font-size:22px;font-weight:800}
  .endcard .g .v.gold{color:var(--gold)}
  .endcard .g .k{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-top:3px}
  .endcard .btns{display:flex;gap:10px;justify-content:center}
  .ecbtn{all:unset;cursor:pointer;font-weight:700;font-size:14px;padding:11px 20px;border-radius:12px}
  .ecbtn.primary{background:linear-gradient(145deg,var(--gold),#ff9f1c);color:#1a1300}
  .ecbtn.ghost{background:rgba(255,255,255,.08);border:1px solid var(--stroke);color:var(--text)}

  /* ---- per-outing plaque (REPLAY-1): small card that animates in at a day's end ---- */
  #plaqueOverlay{background:radial-gradient(125% 125% at 50% 50%,transparent 46%,rgba(3,7,14,.55) 100%);
    backdrop-filter:none;-webkit-backdrop-filter:none}
  #plaqueOverlay.show{pointer-events:none}
  .plaque{width:min(360px,82vw);text-align:center;padding:20px 22px 18px;
    transform:translateY(14px) scale(.96);opacity:0;
    transition:transform .5s cubic-bezier(.2,.7,.2,1),opacity .5s ease}
  #plaqueOverlay.show .plaque{transform:translateY(0) scale(1);opacity:1}
  .plaque .pday{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
  .plaque h3{margin:5px 0 12px;font-size:22px;font-weight:800}
  .plaque .pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:6px 0 12px}
  .plaque .pg .v{font-size:20px;font-weight:800}
  .plaque .pg .v.gold{color:var(--gold)}
  .plaque .pg .k{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-top:2px}
  .plaque .pbig{color:var(--gold);font-size:13px;font-weight:600;margin:2px 0 8px}
  .plaque .pnote{color:var(--text);font-size:13px;line-height:1.4;opacity:.9;
    border-top:1px solid var(--stroke);padding-top:9px;margin-top:4px}
  .endcard .breakdown{display:flex;flex-direction:column;gap:6px;margin:2px 0 16px;text-align:left}
  .endcard .brow{display:flex;align-items:center;gap:8px;font-size:13px}
  .endcard .brow .bdot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
  .endcard .brow .bday{flex:1;color:var(--text)}
  .endcard .brow .bmeta{color:var(--muted);font-variant-numeric:tabular-nums}
  .endcard .review{color:var(--text);font-size:13px;line-height:1.45;opacity:.92;
    border-top:1px solid var(--stroke);padding-top:12px;margin:0 0 16px;text-align:left}
  .wrapwrap{text-align:center}
  .wrapwrap .wclose{margin-top:14px}
  #wrapImg{max-height:78vh;max-width:90vw;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.6)}

  @media (max-width:760px){
    .hud{display:none}
    .title{max-width:62vw}
    .legend{bottom:172px;max-width:160px;font-size:11px}
    .transport{flex-wrap:wrap;gap:10px}
    .clock{min-width:96px}.clock .tod{font-size:16px}
    .marks .m{width:13px;height:13px}
    .speeds{order:3;width:100%;justify-content:space-between}
    .titlecard h2{font-size:26px}
    .tools button{padding:7px 9px;font-size:11px}
  }
  @media (prefers-reduced-motion: reduce){
    #shimmer{animation:none}
    .boat .arrow{transition:none}
  }
</style>
</head>
<body>
<div id="map"></div>
<div id="sky"></div>
<div id="shimmer"></div>
<div id="vignette"></div>

<div class="panel title">
  <h1 id="ttl">Trip</h1>
  <div class="sub" id="sub"></div>
  <div class="cap" id="cap"></div>
</div>

<div class="panel hud" id="hud"></div>

<div class="panel tools">
  <button id="btnFollow">🎥 Follow</button>
  <button id="btnFit">⤢ Fit</button>
  <button id="btnBase">🛰 Satellite</button>
  <button id="btnHeat">🔥 Heatmap</button>
  <button id="btnDwell">💧 Hot spots</button>
  <button id="btnLabels">🏷 Labels</button>
  <button id="btnWrap">✨ Wrapped</button>
</div>

<div class="panel legend" id="legend"></div>

<div class="panel transport">
  <button class="playbtn" id="play">▶</button>
  <div class="clock">
    <div class="tod" id="tod">--:--</div>
    <div class="day" id="dayLabel">—</div>
    <div class="tele" id="tele"></div>
  </div>
  <div class="track-wrap">
    <canvas id="spark"></canvas>
    <div id="phead"></div>
    <div class="marks" id="marks"></div>
    <input class="scrub" id="scrub" type="range" min="0" max="1000" value="0" step="1">
  </div>
  <div class="speeds" id="speeds"></div>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="titleOverlay"><div class="titlecard" id="titleCard"></div></div>
<div class="overlay" id="plaqueOverlay"><div class="panel plaque" id="plaqueCard"></div></div>
<div class="overlay" id="endOverlay"><div class="panel endcard" id="endCard"></div></div>
<div class="overlay" id="wrapOverlay"><div class="wrapwrap">
  <img id="wrapImg" alt="Trip Wrapped poster"/>
  <div class="wclose"><button class="ecbtn ghost" id="wrapClose">Close</button>
    <button class="ecbtn ghost" id="wrapMap">🛰 Map: Off</button>
    <button class="ecbtn primary" id="wrapSave">⬇ Save PNG</button></div>
</div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

      icon:L.divIcon({className:'arealabel',html:esc(a.name),iconSize:null})})));
  let baseIsSat=true, labelsOn=false;
  $('#shimmer').classList.toggle('on', baseIsSat && !reduced);
  // cache per-frame clock-UI nodes (static; never recreated) + the tile pane (Leaflet makes it once)
  const elTod=$('#tod'),elDay=$('#dayLabel'),elTele=$('#tele'),elPhead=$('#phead'),elSky=$('#sky');
  let elTilePane=document.querySelector('.leaflet-tile-pane');

  // ---------- speed coloring ----------
  const TROLL=DATA.speed.troll, RUN=DATA.speed.run;
  function bandOf(s){ if(s==null||isNaN(s)) return 'unk';
    if(s<=TROLL) return 'troll'; if(s>=RUN) return 'run'; return 'cruise'; }
  const BANDCOL={troll:'#ffd24d',cruise:'#36c5ff',run:'#b388ff',unk:'#7d8ea3'};
  const BANDLABEL={troll:'Trolling',cruise:'Cruising',run:'Running',unk:'—'};
  const multi = DATA.days.length>1;

  // ---------- per-day visual state ----------
  // SVG renderer: reprojects the path crisply during animated zooms (canvas warps mid-zoom)
  const renderer = L.svg({padding:0.6});
  const days = DATA.days.map((d,i)=>{
    const st={def:d, idx:i, visible:true};
    st.bands={};
    for(const b of ['troll','cruise','run','unk']){
      const core=L.polyline([], {renderer,color:BANDCOL[b],weight:3.2,opacity:.95,
        lineCap:'round',lineJoin:'round',interactive:false});
      st.bands[b]={core,segs:[],openBand:false,dirty:false};
    }
    // ONE shared wide glow per day (was 4 band-colored glows) — far fewer pixels painted/frame
    st.glow=L.polyline([], {renderer,color:d.color,weight:11,opacity:.16,
      lineCap:'round',lineJoin:'round',interactive:false});
    st.glowPts=[]; st.glowDirty=false;
    st.tail=L.polyline([], {renderer,color:d.color,weight:5,opacity:.9,
      lineCap:'round',lineJoin:'round',interactive:false});
    st.boat=L.marker([0,0], {interactive:false,zIndexOffset:500,
      icon:L.divIcon({className:'',iconSize:[26,26],iconAnchor:[13,13],
        html:`<div class="boat" style="--c:${d.color}"><div class="pulse"></div><div class="arrow"></div></div>`})});
    st.catchLayer=L.layerGroup();
    st.markers={};                 // catchKey -> marker (for fly-to / tour)
    const ts=[...d.track.map(p=>p.t), ...d.catches.filter(c=>c.t!=null).map(c=>c.t)];
    st.range = ts.length? [Math.min.apply(null,ts), Math.max.apply(null,ts)] : null;
    return st;
  });

  // REPLAY-4: per-day cross-day opacity. Each path layer remembers its *base* opacity so we
  // can multiply it by a fade factor (1 = full strength, AMBIENT = faded earlier day). Catch
  // pins + the boat are divIcons, so they fade via their element's CSS opacity.
  function pathLayers(st){
    const ls=[st.glow,st.tail];
    for(const b in st.bands) ls.push(st.bands[b].core);
    return ls;
  }
  for(const st of days){
    for(const ly of pathLayers(st)){ if(ly.options) ly._baseOp=ly.options.opacity; }
    st.fade=1;
  }
  const AMBIENT=0.22;        // earlier days dim to this while a later day plays
  const REVIEW_FADE=0.7;     // weekend-review: all days together at a balanced opacity
  function setDayFade(st, factor){
    st.fade=factor;
    for(const ly of pathLayers(st)){
      const base=(ly._baseOp!=null?ly._baseOp:1);
      if(ly.setStyle) ly.setStyle({opacity:base*factor});
    }
    // catch pins + boat: scale their element opacity (divIcons have no setStyle)
    for(const k in st.markers){ const el=st.markers[k].getElement&&st.markers[k].getElement();
      if(el&&el.style) el.style.opacity=factor; }
    const bel=st.boat.getElement&&st.boat.getElement(); if(bel&&bel.style) bel.style.opacity=factor;
  }

  function addDayLayers(st){
    st.fade=1;            // re-added layers start at full strength; seek() re-applies the fade
    st.glow.addTo(map);   // glow underneath the band cores
    for(const b of ['unk','run','cruise','troll']){ st.bands[b].core.addTo(map); }
    st.tail.addTo(map); st.catchLayer.addTo(map);
  }
  function removeDayLayers(st){
    map.removeLayer(st.glow);
    for(const b in st.bands){ map.removeLayer(st.bands[b].core); }
    map.removeLayer(st.tail); map.removeLayer(st.catchLayer); map.removeLayer(st.boat);
    if(st.dwellLayer) map.removeLayer(st.dwellLayer);
  }
  days.forEach(addDayLayers);

  // ---------- global timeline ----------
  let tMin=Infinity, tMax=-Infinity;
  for(const st of days){
    for(const p of st.def.track){ if(p.t<tMin)tMin=p.t; if(p.t>tMax)tMax=p.t; }
    for(const c of st.def.catches){ if(c.t!=null){ if(c.t<tMin)tMin=c.t; if(c.t>tMax)tMax=c.t; } }
  }
  if(!isFinite(tMin)){ tMin=0; tMax=1; }
  const SPAN=Math.max(1,tMax-tMin);

  let eventTimes=[];
  function rebuildEventTimes(){
    const s=new Set();
    for(const st of days){ if(!st.visible) continue;
      for(const p of st.def.track) s.add(p.t);
      for(const c of st.def.catches) if(c.t!=null) s.add(c.t); }
    eventTimes=Array.from(s).sort((a,b)=>a-b);
  }
  rebuildEventTimes();

  let clock=tMin, lastClock=tMin, playing=false, speed=240, lastFrame=null;
  let bigFlashed=false, toastTimer=null;
  // cinematic state
  let follow=!reduced, beatUntil=0, beatRequest=null, started=false, ended=false, establishing=false;
  let weekendReview=false;   // REPLAY-4: the master-plaque "all days balanced" state
  const FOLLOW_ZOOM=14;   // fixed follow framing — never auto-zooms during playback (you can zoom manually)

  // REPLAY-1: per-outing plaques. We walk DATA.outings in time order; when the clock
  // reaches an outing's `end` (and it isn't the last one — the last folds into the
  // end-card), we animate its plaque, hold, then skip the dead gap to `next`.
  const OUTINGS=(DATA.outings||[]).filter(o=>o.next!=null && o.end!=null);
  const PLAQUE_HOLD_MS=reduced?900:3000;   // how long the day plaque lingers before the skip
  let outingIdx=0, plaqueUntil=0, plaqueSkipTo=null;

  // ---------- reveal engine ----------
  function resetDayReveal(st){
    for(const b in st.bands){ const bd=st.bands[b];
      bd.segs=[]; bd.openBand=false; bd.dirty=false; bd.core.setLatLngs([]); }
    st.glow.setLatLngs([]); st.glowPts=[]; st.glowDirty=false;
    st.tail.setLatLngs([]);
    st.revIdx=0; st.lastLatLng=null; st.boatLL=null; st.curBand=null; st.arrowEl=null; st._lastCrs=null;
    st.catchLayer.clearLayers(); st.shown=new Set(); st.markers={};
    if(map.hasLayer(st.boat)) map.removeLayer(st.boat);
  }
  function appendPoint(st,p){
    const ll=[p.lat,p.lon]; const b=bandOf(p.s); const bd=st.bands[b];
    if(st.lastLatLng){
      if(bd.openBand) bd.segs[bd.segs.length-1].push(ll);
      else bd.segs.push([st.lastLatLng,ll]);
    } else bd.segs.push([ll]);
    for(const k in st.bands) st.bands[k].openBand=(k===b);
    bd.dirty=true; st.lastLatLng=ll; st.curBand=b;
    st.glowPts.push(ll); st.glowDirty=true;   // feed the single shared glow
  }
  function catchKey(c){ return c.uuid || c.id || (c.t+'|'+c.lat+'|'+c.lon); }
  function showCatch(st,c,animate){
    const key=catchKey(c); if(st.shown.has(key)) return; st.shown.add(key);
    // REPLAY-2: emphasize target species + starred trophies + the crowned big fish; everything
    // else (catfish/drum/perch) renders as a smaller/dimmer glyph. Undefined isTarget (old
    // payloads) is treated as emphasized for backward compatibility.
    const emphasized = c.big || c.starred || c.isTarget!==false;
    const cls='catch-pin'+(animate?' pop':'')+(c.big?' big':'')+(emphasized?'':' dim');
    const dvar = multi ? `--d:${st.def.color};` : '';
    const m=L.marker([c.lat,c.lon],{zIndexOffset:c.big?900:800, icon:L.divIcon({className:'',
      iconSize:[30,30],iconAnchor:[15,30],popupAnchor:[0,-28],
      html:`<div class="${cls}" style="--c:${c.color};${dvar}">`+
        (animate?`<div class="ripple" style="--c:${c.color}"></div>`:'')+
        `<div class="badge${c.kept?'':' released'}"><span class="emoji">${c.emoji}</span></div></div>`})});
    m.bindPopup(popupHTML(st.def,c),{closeButton:true,maxWidth:280});
    m.addTo(st.catchLayer); st.markers[key]=m;
    if(st.fade!==1){ const el=m.getElement&&m.getElement(); if(el&&el.style) el.style.opacity=st.fade; }
    if(animate){
      sonarPing(st, c.lat, c.lon);
      if(playing) beatRequest={lat:c.lat, lon:c.lon, big:!!c.big};   // cinematic slow-mo beat
      if(c.big && !bigFlashed){ bigFlashed=true;
        flash(`🏆 Big fish! ${c.len?c.len+'″ ':''}${esc(c.species)} — ${esc(c.fisher)}`, true);
      } else {
        flash(`${c.emoji} ${esc(c.fisher)} — ${esc(c.species)}${c.len?` · ${c.len}″`:''}`);
      }
    }
  }

  function resetOutings(toClock){
    // re-point the outing walker so plaques fire correctly after a scrub/replay; clear any
    // in-flight plaque hold. outingIdx = first outing whose end is still ahead of the clock.
    plaqueUntil=0; plaqueSkipTo=null; hideOverlay('#plaqueOverlay');
    outingIdx=0;
    while(outingIdx<OUTINGS.length && OUTINGS[outingIdx].end<=toClock) outingIdx++;
  }
  function seek(newClock,animate){
    if(newClock<lastClock){ days.forEach(st=>{ if(st.visible) resetDayReveal(st); }); lastClock=tMin;
      resetOutings(newClock); }
    // a manual jump (scrub / fly-to / arrow keys) re-points the plaque walker to wherever
    // the clock landed so plaques don't re-fire for already-passed outings.
    else if(!animate) resetOutings(newClock);
    for(const st of days){
      if(!st.visible) continue;
      if(st.revIdx===undefined) resetDayReveal(st);
      const T=st.def.track;
      while(st.revIdx<T.length && T[st.revIdx].t<=newClock){ appendPoint(st,T[st.revIdx]); st.revIdx++; }
      if(st.glowDirty){ st.glow.setLatLngs(st.glowPts); st.glowDirty=false; }
      for(const k in st.bands){ const bd=st.bands[k];
        if(bd.dirty){ bd.core.setLatLngs(bd.segs); bd.dirty=false; } }
      if(st.revIdx>0){
        const tail=T.slice(Math.max(0,st.revIdx-14),st.revIdx).map(p=>[p.lat,p.lon]);
        st.tail.setLatLngs(tail);
      } else st.tail.setLatLngs([]);
      if(st.lastLatLng){
        // INTERPOLATE the boat to the exact clock between the last revealed point and the next
        // one, so it glides smoothly instead of snapping point-to-point (fixes the "skipping").
        const prev=T[st.revIdx-1], next=T[st.revIdx];
        let bll=st.lastLatLng, crs=(prev&&prev.c!=null?prev.c:null);
        if(prev && next && next.t>prev.t){
          const f=Math.max(0,Math.min(1,(newClock-prev.t)/(next.t-prev.t)));
          bll=[prev.lat+(next.lat-prev.lat)*f, prev.lon+(next.lon-prev.lon)*f];
          if(next.c!=null) crs=next.c;
        }
        st.boatLL=bll;
        st.boat.setLatLng(bll);
        if(!map.hasLayer(st.boat)) st.boat.addTo(map);
        if(crs!=null){
          if(!st.arrowEl){ const el=st.boat.getElement&&st.boat.getElement(); st.arrowEl=el&&el.querySelector('.arrow'); }
          if(st.arrowEl && (st._lastCrs==null || Math.abs(st._lastCrs-crs)>2)){
            st.arrowEl.style.transform=`rotate(${crs}deg)`; st._lastCrs=crs; }
        }
      }
      for(const c of st.def.catches){ if(c.t!=null && c.t<=newClock) showCatch(st,c,animate); }
    }
    lastClock=newClock; clock=newClock;
    const ld=leadDay();          // compute once, share with follow + clock UI
    applyCrossDayFade(ld);
    applyFollow(ld);
    updateClockUI(ld);
  }

  // REPLAY-4: during playback the lead (currently-playing) day is full-opacity; EARLIER days
  // fade to AMBIENT so they don't compete. weekend-review overrides everything to a balanced
  // REVIEW_FADE for the all-days finale look.
  function applyCrossDayFade(ld){
    if(!multi) return;
    for(const st of days){
      if(!st.visible) continue;
      let f;
      if(weekendReview) f=REVIEW_FADE;
      else if(ld && st!==ld && st.range && ld.range && st.range[1]<=ld.range[0]) f=AMBIENT;
      else f=1;
      if(st.fade!==f) setDayFade(st,f);
    }
  }

  // ---------- follow camera ----------
  const leadDay=()=>{ // the visible day whose range contains/owns the clock
    let best=null,bd=Infinity;
    for(const st of days){ if(!st.visible||!st.range) continue;
      const a=st.range[0],b=st.range[1];
      const dist=clock<a?a-clock:(clock>b?clock-b:0);
      if(dist<bd){bd=dist;best=st;} }
    return best;
  };
  let _lastPanTs=-1e9;
  function applyFollow(st){
    if(!follow || !playing || !started || establishing || _vt<beatUntil) return;
    if(!st) st=leadDay(); const ll=st&&(st.boatLL||st.lastLatLng); if(!ll) return;
    // PAN ONLY — never change zoom during playback (zoom = tile reload + path reproject = jank).
    // Recenter on the interpolated boat EVERY frame so it stays pinned to center (no drift-snap).
    map.panTo(ll, {animate:false});
  }
  function setFollow(on){ follow=on; $('#btnFollow').classList.toggle('on',on);
    if(on){ const st=leadDay(); const ll=st&&(st.boatLL||st.lastLatLng); if(ll){ map.panTo(ll,{animate:false}); } }
  }
  map.on('dragstart',()=>{ if(follow) setFollow(false); });   // grab the map -> stop following (zoom keeps following)

  // ---------- playback loop (with cinematic slow-mo beats) ----------
  function performance_now(){ return _vt; }   // virtual clock fed by rAF timestamps
  let _vt=0;
  function frame(ts){
    if(!playing){ lastFrame=null; return; }
    _vt=ts;
    if(lastFrame==null) lastFrame=ts;
    let dt=(ts-lastFrame)/1000; lastFrame=ts;

    // REPLAY-1: holding on an outing plaque — freeze the boat, then SKIP the dead gap.
    if(plaqueUntil>0){
      if(ts<plaqueUntil){ if(playing) requestAnimationFrame(frame); return; }
      plaqueUntil=0; hideOverlay('#plaqueOverlay');
      if(plaqueSkipTo!=null && plaqueSkipTo>clock){ clock=plaqueSkipTo; flashGap(); }
      plaqueSkipTo=null; outingIdx++;
      lastFrame=ts; if(playing) requestAnimationFrame(frame); return;
    }

    let eff=speed;
    if(ts<beatUntil) eff=speed*0.06;            // slow-mo during a catch beat
    let nc=clock+dt*eff;
    const nextEv=eventTimes.find(t=>t>clock+0.001);
    if(ts>=beatUntil && nextEv!=null && nextEv-clock>DATA.gapSkip && nc<nextEv){ nc=nextEv; flashGap(); }
    if(nc>=tMax){ nc=tMax; }

    // REPLAY-1: did we just reach the end of the current outing? clamp to it, reveal its
    // catches, then raise the day plaque (the skip happens once the hold expires, above).
    const cur=OUTINGS[outingIdx];
    if(cur && ts>=beatUntil && clock<cur.end && nc>=cur.end){
      nc=cur.end; seek(nc,true);
      showPlaque(cur); plaqueUntil=ts+PLAQUE_HOLD_MS; plaqueSkipTo=cur.next;
      if(playing) requestAnimationFrame(frame); return;
    }
    seek(nc,true);
    // a catch may have requested a cinematic beat during seek() — slow-mo only (no zoom punch;
    // follow already keeps the catch near center, and a zoom mid-playback caused tile/path jank)
    if(beatRequest){
      const b=beatRequest; beatRequest=null;
      beatUntil = ts + (b.big?1800:1000);
    }
    if(nc>=tMax && ts>=beatUntil){ playing=false; setPlayUI(); showEndcard(); }
    if(playing) requestAnimationFrame(frame);
  }
  function play(){ hideOverlay('#endOverlay'); hideOverlay('#plaqueOverlay'); ended=false;
    if(weekendReview){ weekendReview=false; days.forEach(st=>{ if(st.visible) setDayFade(st,1); }); }
    if(clock>=tMax){ bigFlashed=false; seek(tMin,false); } playing=true; setPlayUI();
    lastFrame=null; requestAnimationFrame(frame); }
  function pause(){ playing=false; setPlayUI(); }
  function toggle(){ playing?pause():play(); }
  function setPlayUI(){ $('#play').textContent=playing?'❚❚':'▶';
    document.body.classList.toggle('paused',!playing);
    document.body.classList.toggle('playing',playing); }   // 'playing' drops backdrop blur/shimmer

  // ---------- header / HUD ----------
  $('#ttl').textContent=DATA.title;
  const S=DATA.stats;
  const tz=DATA.tz||{label:''};
  $('#sub').textContent=
    `${S.days} day${S.days>1?'s':''} · ${S.catches} caught · ${S.miles} mi · ${S.hours} hr`+
    (S.bagTotal!=null?` · ${S.bagTotal} lb`:'')+(tz.label?` · times ${tz.label}`:'');
  $('#cap').textContent=DATA.caption||'';
  if(tz.straddle && tz.straddle.length){
    setTimeout(()=>flash(`⏱ Phone straddled ${tz.straddle.join(' & ')} — showing ${tz.label}`),1400);
  }

  const hud=$('#hud');
  const hudStats=[
    ['Catches', S.catches, false],
    ['Kept', S.kept, false],
    ['Biggest', S.biggest?`${S.biggest}<small>″</small>`:'—', true],
  ];
  if(S.bagTotal!=null) hudStats.push([multi?'Weekend bag':'Bag', `${S.bagTotal}<small> lb</small>`, true]);
  hudStats.push(['Miles', S.miles, false], ['Hours', S.hours, false],
    ['Top lure', esc(S.topLure||'—'), false]);
  hud.innerHTML=hudStats.map(([k,v,brag],i)=>
    `${i?'<div class="sep"></div>':''}<div class="stat${brag?' brag':''}"><div class="v">${v}</div><div class="k">${esc(k)}</div></div>`
  ).join('');

  // ---------- legend ----------
  let lh='';
  if(DATA.fishermen.length){
    lh+='<p class="lg-title">Anglers</p>';
    for(const f of DATA.fishermen)
      lh+=`<div class="row"><span class="dot" style="background:${f.color}"></span>${esc(f.name)}</div>`;
  }
  lh+='<p class="lg-title" style="margin-top:10px">Boat speed</p>';
  for(const b of ['troll','cruise','run'])
    lh+=`<div class="row"><span class="ln" style="background:${BANDCOL[b]}"></span>${BANDLABEL[b]}</div>`;
  if(multi) lh+='<p class="lg-title" style="margin-top:10px">Days (tap to toggle)</p><div class="days" id="dayChips"></div>';
  lh+='<div id="heatLegend"><p class="lg-title" style="margin-top:10px">Catch density</p>'+
      '<div class="heatbar"></div><div class="heatcap"><span>fewer</span><span>more fish</span></div>'+
      '<div class="heatfilter" id="heatFilter"></div>'+
      '<button class="heattoggle" id="btnHeatAll">Show all species</button></div>';
  $('#legend').innerHTML=lh;

  if(multi){
    const dc=$('#dayChips');
    days.forEach(st=>{
      const chip=document.createElement('span');
      chip.className='chip'; chip.style.borderColor=st.def.color; chip.style.color=st.def.color;
      const n=st.def.stats.catches;
      chip.textContent=st.def.label+(n?` · ${n}`:' · Ø');
      chip.onclick=()=>{
        st.visible=!st.visible; chip.classList.toggle('off',!st.visible);
        if(!st.visible) removeDayLayers(st); else { addDayLayers(st); if(dwellOn) addDwell(st); }
        rebuildEventTimes(); rebuildMarks(); buildSpark();
        const c=clock; lastClock=tMin;
        days.forEach(s=>{ if(s.visible) resetDayReveal(s); });
        seek(c,false);
        if(heat) refreshHeat();
      };
      dc.appendChild(chip); st.chip=chip;
    });
  }

  // ---------- scrubber marks (clickable -> fly to that fish) ----------
  function rebuildMarks(){
    const m=$('#marks'); m.innerHTML='';
    for(const st of days){ if(!st.visible) continue;
      for(const c of st.def.catches){ if(c.t==null) continue;
        const x=((c.t-tMin)/SPAN)*100;
        const dot=document.createElement('div'); dot.className='m';
        dot.style.left=x+'%';
        dot.style.background = multi ? st.def.color : c.color;
        dot.style.borderColor = c.color;
        dot.title=`${c.fisher} · ${c.species}${c.len?` · ${c.len}″`:''}`;
        dot.onclick=()=>flyToCatch(st,c);
        m.appendChild(dot);
      }
    }
  }
  rebuildMarks();

  function flyToCatch(st,c){
    pause(); hideOverlay('#endOverlay');
    seek(c.t,false);
    if(!reduced){ try{ map.flyTo([c.lat,c.lon],16.5,{duration:0.8}); }catch(e){} }
    else map.setView([c.lat,c.lon],16,{animate:false});
    const mk=st.markers[catchKey(c)]; if(mk) setTimeout(()=>mk.openPopup(),reduced?0:820);
  }

  // ---------- speed sparkline ----------
  const spark=$('#spark');
  function buildSpark(){
    const cv=spark; const ctx=cv.getContext&&cv.getContext('2d'); if(!ctx) return;
    const w=cv.clientWidth||cv.width||600, h=cv.clientHeight||26;
    cv.width=w; cv.height=h;
    if(!ctx.clearRect) return;
    ctx.clearRect(0,0,w,h);
    // max speed for scaling
    let mx=RUN*1.3;
    for(const st of days){ if(!st.visible) continue; for(const p of st.def.track) if(p.s!=null&&p.s>mx) mx=p.s; }
    for(const st of days){ if(!st.visible) continue;
      for(const p of st.def.track){
        if(p.s==null) continue;
        const x=((p.t-tMin)/SPAN)*w;
        const bh=Math.max(1.5,(Math.min(p.s,mx)/mx)*(h-2));
        ctx.fillStyle=BANDCOL[bandOf(p.s)];
        ctx.globalAlpha=.85;
        ctx.fillRect(x, h-bh, 1.4, bh);
      }
    }
    ctx.globalAlpha=1;
  }

  // ---------- speeds ----------
  const SPEEDS=[[60,'60×'],[240,'240×'],[1000,'1000×'],[4000,'max']];
  const sp=$('#speeds');
  sp.innerHTML=SPEEDS.map(([v,l])=>`<button data-v="${v}">${l}</button>`).join('');
  function setSpeedUI(){ sp.querySelectorAll('button').forEach(b=>b.classList.toggle('on',+b.dataset.v===speed)); }
  sp.querySelectorAll('button').forEach(b=>b.onclick=()=>{ speed=+b.dataset.v; setSpeedUI(); });
  setSpeedUI();

  // ---------- play + scrub ----------
  $('#play').onclick=toggle;
  const scrub=$('#scrub');
  let wasPlaying=false;
  const armResume=()=>{ wasPlaying=playing; };
  scrub.addEventListener('pointerdown',armResume);
  scrub.addEventListener('mousedown',armResume);
  scrub.addEventListener('touchstart',armResume);
  scrub.addEventListener('input',()=>{ if(playing) pause(); hideOverlay('#endOverlay');
    const frac=+scrub.value/1000; seek(tMin+frac*SPAN,false); });
  scrub.addEventListener('change',()=>{ if(wasPlaying && clock<tMax) play(); });

  // dawn/dusk look is stepped by hour bucket, so only touch the DOM when the bucket changes
  const SKY=[['#0a1840','#03060f',.5,'saturate(.85) brightness(.8) contrast(1.05)'],
             ['#ff9e5e','#2a3a6b',.42,'saturate(1.15) brightness(.98) sepia(.12)'],
             ['#bfe0ff','#7fa8cf',.16,'saturate(1.05) brightness(1.02)'],
             ['#ff8a3d','#7a2f5e',.4,'saturate(1.2) brightness(.97) sepia(.16)'],
             ['#102050','#03060f',.5,'saturate(.85) brightness(.78) contrast(1.06)']];
  let _skyBucket=-1;
  function skyTint(e){
    const dd=new Date(e*1000); const h=dd.getUTCHours()+dd.getUTCMinutes()/60;
    const bkt = h<5?0 : h<8?1 : h<16?2 : h<20?3 : 4;
    if(bkt===_skyBucket) return; _skyBucket=bkt;          // <-- skip the per-frame filter write
    const c=SKY[bkt];
    elSky.style.background=`linear-gradient(180deg,${c[0]},${c[1]})`; elSky.style.opacity=c[2];
    if(elTilePane) elTilePane.style.filter=c[3];
  }

  // per-frame UI: write only what changed; playhead via composited transform (no layout)
  let _phW=0, _lTod='', _lDay='', _lTele='', _lScrub=-1, _scrubTs=-1e9;
  function measurePhead(){ const host=elPhead&&elPhead.parentElement; _phW=host?host.clientWidth:0; }
  function updateClockUI(st){
    if(st===undefined) st=leadDay();
    const tod=clockStr(clock);
    if(tod!==_lTod){ elTod.textContent=tod; _lTod=tod; }
    let lbl='—';
    if(st){ lbl=st.def.label;
      if(st.def.stats.catches===0) lbl+=' · skunked 🚫';
      else if(st.def.bag!=null) lbl+=` · ${st.def.bag} lb bag`; }
    if(lbl!==_lDay){ elDay.textContent=lbl; _lDay=lbl; }
    let tele='';
    if(st && st.revIdx>0){ const T=st.def.track; const p=T[Math.max(0,Math.min(T.length-1,st.revIdx-1))];
      if(p && p.s!=null){ const mph=(p.s*2.236936).toFixed(1);
        tele=`${mph} mph · ${BANDLABEL[bandOf(p.s)]}`+(p.c!=null?` · ${compass(p.c)} ${Math.round(p.c)}°`:''); } }
    if(tele!==_lTele){ elTele.textContent=tele; _lTele=tele; }
    const pct=((clock-tMin)/SPAN)*100; const pr=Math.round(pct*10);
    if(pr!==_lScrub){ _lScrub=pr;
      // playhead is a composited transform -> cheap, update every change
      if(elPhead){ if(!_phW) measurePhead(); elPhead.style.transform=`translateX(${(pct/100)*_phW}px)`; }
      // the range-input writes force layout/style -> throttle to ~30Hz (imperceptible)
      if(_vt-_scrubTs>=33){ _scrubTs=_vt;
        scrub.style.background=`linear-gradient(90deg,var(--accent) ${pct}%,rgba(255,255,255,.14) ${pct}%)`;

    }

  }

  function heatPoints(){ const pts=[]; for(const st of days){ if(!st.visible) continue;

  // ---------- Trip Wrapped poster (self-drawn SVG -> PNG, dependency-free) ----------
  // poster track-box geometry (shared by SVG + tile compositor)
  const WRAPBOX={W:1080,H:1350,P:70,bx:70,by:440,bw:1080-140,bh:560};
  function wrappedSVG(satMode){
    const W=WRAPBOX.W,H=WRAPBOX.H,P=WRAPBOX.P;
    const b=posterBounds(); // padded, aspect-fitted [[s,w],[n,e]] (matches the tiles)
    // fit the whole trip track to a box
    const bx=WRAPBOX.bx, by=WRAPBOX.by, bw=WRAPBOX.bw, bh=WRAPBOX.bh;
    function proj(lat,lon){
      if(!b) return [W/2,by+bh/2];
      const s=b[0][0],w=b[0][1],nn=b[1][0],e=b[1][1];
      // Web-Mercator Y so the track lines up with the satellite tiles (which are
      // mercator); longitude is already linear in mercator X. The zoom cancels in
      // the ratio, so any z works. Keeps the dark-mode look identical in practice.
      const my=lat2y(lat,1), myN=lat2y(nn,1), myS=lat2y(s,1);
      const fx=(lon-w)/Math.max(1e-6,(e-w));
      const fy=(myS-my)/Math.max(1e-6,(myS-myN));   // 0 at south, 1 at north
      return [bx+fx*bw, by+bh-fy*bh];
    }
    let polys='';
    for(const st of days){
      const pts=st.def.track.map(p=>proj(p.lat,p.lon).map(n=>n.toFixed(1)).join(',')).join(' ');
      if(pts) polys+=`<polyline points="${pts}" fill="none" stroke="${st.def.color}" stroke-width="3" stroke-opacity="0.9" stroke-linejoin="round" stroke-linecap="round"/>`;
    }
    let pins='';
    for(const st of days) for(const c of st.def.catches){ const [x,y]=proj(c.lat,c.lon);
      pins+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${c.big?11:7}" fill="${c.big?'#ffd24d':c.color}" stroke="#05080d" stroke-width="2"/>`; }
    const stat=(x,v,k,gold)=>`<text x="${x}" y="1120" text-anchor="middle" font-size="58" font-weight="800" fill="${gold?'#ffd24d':'#eaf2ff'}" font-family="Arial">${v}</text>`+
      `<text x="${x}" y="1158" text-anchor="middle" font-size="24" fill="#9fb2c9" font-family="Arial" letter-spacing="2">${k}</text>`;
    const cells=[[S.catches,'CATCHES',false],[S.biggest?S.biggest+'″':'—','BIGGEST',true],
      [S.bagTotal!=null?S.bagTotal+'lb':S.miles+'mi',S.bagTotal!=null?'BAG':'MILES',S.bagTotal!=null]];
    let statsSvg=''; cells.forEach((c,i)=>{ statsSvg+=stat(W/2+(i-1)*330,c[0],c[1],c[2]); });
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`+
      `<defs><radialGradient id="bg" cx="50%" cy="30%" r="90%">`+
      `<stop offset="0%" stop-color="#0c1828"/><stop offset="100%" stop-color="#04070d"/></radialGradient></defs>`+
      // In sat mode the canvas already holds the satellite tiles in the track box;
      // punch a hole in the poster background (evenodd) so those tiles show through
      // instead of being painted over by this opaque gradient.
      (satMode
        ? `<path fill="url(#bg)" fill-rule="evenodd" d="M0 0H${W}V${H}H0Z M${bx} ${by}H${bx+bw}V${by+bh}H${bx}Z"/>`
        : `<rect width="${W}" height="${H}" fill="url(#bg)"/>`)+
      `<text x="${W/2}" y="150" text-anchor="middle" font-size="34" fill="#36c5ff" font-family="Arial" letter-spacing="8">TRIP REPLAY</text>`+
      `<text x="${W/2}" y="225" text-anchor="middle" font-size="62" font-weight="800" fill="#eaf2ff" font-family="Arial">${escSvg(DATA.title)}</text>`+
      `<text x="${W/2}" y="285" text-anchor="middle" font-size="30" fill="#ffd24d" font-family="Arial">${escSvg(DATA.caption||'')}</text>`+
      `<rect x="${bx-10}" y="${by-10}" width="${bw+20}" height="${bh+20}" rx="22" fill="${satMode?'none':'#060c16'}" stroke="rgba(255,255,255,.08)"/>`+
      polys+pins+statsSvg+
      `<text x="${W/2}" y="1275" text-anchor="middle" font-size="22" fill="#7d8ea3" font-family="Arial">${escSvg((DATA.tz&&DATA.tz.label)||'')} · ${escSvg(DATA.generated||'')}</text>`+
      `</svg>`;
  }
  const escSvg=s=>(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let wrapBlobUrl=null, wrapSat=false;
  // --- satellite tile compositor (dependency-free): paint Esri World_Imagery
  // tiles covering the track bounds into the poster's track box, on a canvas. ---
  const SAT_URL='https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/';
  const lon2x=(lon,z)=>(lon+180)/360*Math.pow(2,z);
  const lat2y=(lat,z)=>{const r=lat*Math.PI/180;return (1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*Math.pow(2,z);};
  const invMercY=(yn)=>{const n=Math.PI*(1-2*yn);return Math.atan(Math.sinh(n))*180/Math.PI;};
  // Padded, box-aspect-fitted bounds SHARED by the poster track + the satellite
  // tiles, so they (a) stay aligned, (b) aren't stretched non-uniformly, and
  // (c) have breathing room around the track.
  function posterBounds(){
    const b=DATA.bounds; if(!b) return b;
    const s=b[0][0],w=b[0][1],nn=b[1][0],e=b[1][1];
    const mx=lon=>(lon+180)/360, my=lat=>lat2y(lat,0);          // normalized mercator (0..1)
    let x0=mx(w),x1=mx(e),y0=my(nn),y1=my(s);                   // y0=north/top, y1=south/bottom
    let cx=(x0+x1)/2, cy=(y0+y1)/2, Wm=(x1-x0), Hm=(y1-y0);
    const PAD=0.14; Wm*=(1+2*PAD); Hm*=(1+2*PAD);               // zoom out a touch
    const boxAR=WRAPBOX.bw/WRAPBOX.bh;
    if(Wm/Hm < boxAR) Wm=Hm*boxAR; else Hm=Wm/boxAR;            // match the box aspect (no stretch)
    const nx0=cx-Wm/2,nx1=cx+Wm/2,ny0=cy-Hm/2,ny1=cy+Hm/2;
    return [[invMercY(ny1), nx0*360-180],[invMercY(ny0), nx1*360-180]];  // [[s,w],[n,e]]
  }
  function paintSatTiles(ctx,b){
    // b=[[s,w],[n,e]]. choose a zoom where the bounds span a few tiles.
    return new Promise(resolve=>{
      try{
        const s=b[0][0],w=b[0][1],nn=b[1][0],e=b[1][1];
        let z=13;
        for(z=18;z>=2;z--){
          const tw=Math.abs(lon2x(e,z)-lon2x(w,z)), th=Math.abs(lat2y(s,z)-lat2y(nn,z));
          if(tw<=8 && th<=8) break;   // allow more tiles -> sharper imagery
        }
        const X0=Math.floor(lon2x(w,z)), X1=Math.floor(lon2x(e,z));
        const Y0=Math.floor(lat2y(nn,z)), Y1=Math.floor(lat2y(s,z));
        // pixel coords (256px tiles) of the requested geographic bounds
        const pxW=lon2x(w,z)*256, pxE=lon2x(e,z)*256;
        const pyN=lat2y(nn,z)*256, pyS=lat2y(s,z)*256;
        const spanX=pxE-pxW, spanY=pyS-pyN;
        const bx=WRAPBOX.bx,by=WRAPBOX.by,bw=WRAPBOX.bw,bh=WRAPBOX.bh;
        ctx.save(); ctx.beginPath();
        // rounded-rect clip matching the box
        const r=20,x=bx,y=by,ww=bw,hh=bh;
        ctx.moveTo(x+r,y);ctx.arcTo(x+ww,y,x+ww,y+hh,r);ctx.arcTo(x+ww,y+hh,x,y+hh,r);
        ctx.arcTo(x,y+hh,x,y,r);ctx.arcTo(x,y,x+ww,y,r);ctx.closePath();ctx.clip();
        ctx.fillStyle='#060c16'; ctx.fillRect(bx,by,bw,bh); // fallback fill under any missing tile
        const jobs=[];
        for(let tx=X0;tx<=X1;tx++)for(let ty=Y0;ty<=Y1;ty++){
          jobs.push(new Promise(res=>{
            const im=new Image(); im.crossOrigin='anonymous';
            im.onload=()=>{
              try{
                const dx=bx+((tx*256)-pxW)/spanX*bw;
                const dy=by+((ty*256)-pyN)/spanY*bh;
                const dw=256/spanX*bw, dh=256/spanY*bh;
                ctx.drawImage(im,dx,dy,dw,dh);
              }catch(_){}
              res(true);
            };
            im.onerror=()=>res(false);
            im.src=SAT_URL+z+'/'+ty+'/'+tx;
          }));
        }
        Promise.all(jobs).then(()=>{ ctx.restore(); resolve(true); });
      }catch(e){ try{ctx.restore();}catch(_){} resolve(false); }
    });
  }
  function renderWrap(){
    const svg=wrappedSVG(wrapSat);
    const url='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement('canvas'); cv.width=WRAPBOX.W; cv.height=WRAPBOX.H;
      const ctx=cv.getContext('2d');
      ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
      if(wrapSat && DATA.bounds) paintSatTiles(ctx,posterBounds()).then(finish); else finish();
      function finish(){
        ctx.drawImage(img,0,0,WRAPBOX.W,WRAPBOX.H);
        try{ cv.toBlob(bl=>{ if(wrapBlobUrl) URL.revokeObjectURL(wrapBlobUrl);
          wrapBlobUrl=URL.createObjectURL(bl); $('#wrapImg').src=wrapBlobUrl; }, 'image/png'); }
        catch(e){ $('#wrapImg').src=url; } // CORS-tainted canvas: show SVG (dark) instead
      }
    };
    img.onerror=()=>{ $('#wrapImg').src=url; };
    img.src=url;
  }
  function openWrapped(){ renderWrap(); showOverlay('#wrapOverlay'); }
  $('#wrapMap').onclick=()=>{ wrapSat=!wrapSat;
    $('#wrapMap').textContent=wrapSat?'🛰 Map: On':'🛰 Map: Off';
    $('#wrapMap').classList.toggle('primary',wrapSat);
    renderWrap(); };
  $('#btnWrap').onclick=openWrapped;
  $('#wrapClose').onclick=()=>hideOverlay('#wrapOverlay');
  $('#wrapSave').onclick=()=>{ const a=document.createElement('a');
    a.href=wrapBlobUrl||$('#wrapImg').src; a.download=(DATA.title||'trip').replace(/[^\w]+/g,'_')+'_wrapped.png';
    document.body.appendChild(a); a.click(); a.remove(); };

  // ---------- keyboard ----------
  window.addEventListener('keydown',e=>{
    if(e.code==='Space'){ e.preventDefault(); if($('#titleOverlay').classList.contains('show')){ skipTitle(); } else toggle(); }
    else if(e.code==='ArrowRight'){ pause(); seek(Math.min(tMax,clock+SPAN*0.02),false); }
    else if(e.code==='ArrowLeft'){ pause(); seek(Math.max(tMin,clock-SPAN*0.02),false); }
    else if(e.code==='Escape'){ hideOverlay('#wrapOverlay'); hideOverlay('#endOverlay'); }
  });
  $('#titleOverlay').addEventListener('click',()=>skipTitle());

  // ---------- resize ----------
  window.addEventListener('resize',()=>{ buildSpark(); measurePhead(); });

  // ---------- go ----------
  function startPlay(){ if(started) return; started=true; hideOverlay('#titleOverlay');
    $('#btnFollow').classList.toggle('on',follow);
    if(follow){
      const st=leadDay(); const ll=st&&st.lastLatLng;
      if(ll){
        // ONE establishing zoom-in from the whole-track overview to follow framing, then pan-only
        if(!reduced){ establishing=true;
          try{ map.flyTo(ll, FOLLOW_ZOOM, {duration:1.1}); }catch(e){ try{map.setView(ll,FOLLOW_ZOOM,{animate:false});}catch(_){} }
          setTimeout(()=>{ establishing=false; _lastPanTs=-1e9; }, 1200);
        } else { try{map.setView(ll,FOLLOW_ZOOM,{animate:false});}catch(_){} }
      }
    }
    play(); }
  function skipTitle(){ if(started) return; flyAndPlay(); }
  function flyAndPlay(){
    hideOverlay('#titleOverlay');
    if(DATA.bounds){ try{ map.flyToBounds(L.latLngBounds(DATA.bounds),{padding:[50,50],maxZoom:15,duration:1.6}); }catch(e){}
      map.once('moveend',startPlay); }
    setTimeout(startPlay,2400);
  }

  days.forEach(resetDayReveal);
  buildSpark();
  fitAll();
  updateClockUI();
  if(SPAN>3){
    seek(tMin,false);
    showTitle();
    setTimeout(()=>{ if(!started){ flyAndPlay(); } }, 1700);  // hold the title, then fly in + play
  } else {
    seek(tMax,false); started=true;
  }
})();
</script>
</body>
